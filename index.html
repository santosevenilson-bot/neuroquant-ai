<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NeuroQuant IA v4.0</title>

<script src="https://s3.tradingview.com/tv.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600;800&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Orbitron',sans-serif;}
body{background:#0e1117;color:white;scroll-behavior:smooth;}

header{
position:fixed;width:100%;
background:#111827;
display:flex;justify-content:space-between;align-items:center;
padding:15px 30px;z-index:1000;
border-bottom:1px solid #1f2937;
}

.logo{font-weight:800;color:#00f7ff;}

.hero{
height:90vh;display:flex;flex-direction:column;
justify-content:center;align-items:center;text-align:center;
background:linear-gradient(135deg,#0e1117,#111827);
padding:20px;
}

.hero h1{
font-size:42px;
background:linear-gradient(90deg,#00f7ff,#00ff88);
-webkit-background-clip:text;
-webkit-text-fill-color:transparent;
margin-bottom:20px;
}

.hero button{
background:#00f7ff;
border:none;padding:12px 25px;
border-radius:30px;font-weight:bold;
cursor:pointer;
box-shadow:0 0 15px rgba(0,247,255,.4);
}

.platform{
padding:80px 20px;
max-width:1300px;
margin:auto;
}

.grid{
display:grid;
grid-template-columns:2fr 1fr;
gap:20px;
}

.panel{
background:#161b22;
padding:20px;
border-radius:15px;
box-shadow:0 0 20px rgba(0,247,255,.05);
}

input,select{
padding:8px;border-radius:8px;border:none;margin:5px;
}

button.generate{
background:#00f7ff;border:none;
padding:10px 20px;border-radius:20px;
cursor:pointer;font-weight:bold;
margin-top:10px;
}

.signal{
font-size:22px;font-weight:bold;margin-top:10px;
}

.buy{color:#00ff88;}
.sell{color:#ff4d4d;}
.neutral{color:#ffc107;}

.loader{
border:4px solid #222;
border-top:4px solid #00f7ff;
border-radius:50%;
width:30px;height:30px;
animation:spin 1s linear infinite;
margin:auto;
display:none;
}

@keyframes spin{
0%{transform:rotate(0deg);}
100%{transform:rotate(360deg);}
}

.strength-bar{
height:10px;background:#222;
border-radius:10px;margin-top:10px;
overflow:hidden;
}

.strength-fill{
height:100%;background:#00ff88;
width:0%;
transition:width 1s ease;
}

.history{
font-size:12px;margin-top:15px;
border-top:1px solid #222;padding-top:10px;
max-height:150px;overflow:auto;
}

footer{
text-align:center;padding:40px;
opacity:.5;margin-top:40px;
}
</style>
</head>

<body>

<header>
<div class="logo">NeuroQuant IA v4.0</div>
</header>

<section class="hero">
<h1>Inteligência Artificial aplicada ao mercado cripto</h1>
<button onclick="scrollToPlatform()">Entrar na Plataforma</button>
</section>

<section class="platform" id="platform">

<div class="grid">

<div class="panel">
<input type="text" id="pair" placeholder="Ex: BTCUSDT">
<select id="timeframe">
<option value="5">5m</option>
<option value="15">15m</option>
<option value="60">1h</option>
<option value="240">4h</option>
</select>
<button class="generate" onclick="loadChart()">Carregar Gráfico</button>
<div id="chart" style="margin-top:20px;"></div>
</div>

<div class="panel">
<h3>Status do Mercado</h3>
<p id="marketStatus">--</p>

<div class="loader" id="loader"></div>

<div id="result" style="display:none;">
<div class="signal" id="signalText"></div>
<p id="probText"></p>
<p id="targetText"></p>
<p id="stopText"></p>

<div class="strength-bar">
<div class="strength-fill" id="strengthFill"></div>
</div>

<div class="history" id="history"></div>
</div>

<button class="generate" onclick="generateSignal()">Gerar Sinal</button>

</div>

</div>

</section>

<footer>
© 2026 NeuroQuant IA — Plataforma Profissional
</footer>

<script>

let historyList=[];

function scrollToPlatform(){
document.getElementById("platform").scrollIntoView({behavior:"smooth"});
}

function loadChart(){
let pair=document.getElementById("pair").value.toUpperCase();
let tf=document.getElementById("timeframe").value;
if(pair===""){alert("Digite um par");return;}

document.getElementById("chart").innerHTML="";
new TradingView.widget({
width:"100%",
height:500,
symbol:"BINANCE:"+pair,
interval:tf,
theme:"dark",
container_id:"chart"
});
}

function generateSignal(){

document.getElementById("loader").style.display="block";
document.getElementById("result").style.display="none";

setTimeout(()=>{

let market=Math.random();
let status,signal,prob,strength,className;

if(market>0.6){
status="Alta";
signal="COMPRA";
prob=Math.floor(75+Math.random()*10);
strength=Math.floor(65+Math.random()*25);
className="buy";
}else if(market<0.4){
status="Baixa";
signal="VENDA";
prob=Math.floor(75+Math.random()*10);
strength=Math.floor(65+Math.random()*25);
className="sell";
}else{
status="Consolidação";
signal="NEUTRO";
prob=Math.floor(50+Math.random()*10);
strength=Math.floor(40+Math.random()*20);
className="neutral";
}

let target=(Math.random()*100000).toFixed(2);
let stop=(Math.random()*100000).toFixed(2);

document.getElementById("marketStatus").innerText=status;
document.getElementById("signalText").innerHTML="<span class='"+className+"'>"+signal+"</span>";
document.getElementById("probText").innerText="Probabilidade: "+prob+"%";
document.getElementById("targetText").innerText="Alvo sugerido: "+target;
document.getElementById("stopText").innerText="Stop sugerido: "+stop;
document.getElementById("strengthFill").style.width=strength+"%";

let time=new Date().toLocaleTimeString();
historyList.unshift(signal+" - "+prob+"% ("+time+")");
updateHistory();

document.getElementById("loader").style.display="none";
document.getElementById("result").style.display="block";

},1500);

}

function updateHistory(){
let historyDiv=document.getElementById("history");
historyDiv.innerHTML="<strong>Histórico:</strong><br>";
historyList.slice(0,6).forEach(item=>{
historyDiv.innerHTML+=item+"<br>";
});
}

</script>

</body>
</html>
