<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NeuroQuant IA</title>

<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#0e1117">

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600&display=swap" rel="stylesheet">
<script src="https://s3.tradingview.com/tv.js"></script>

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Orbitron',sans-serif;}
body{background:#0e1117;color:white;text-align:center;padding:20px;}
h1{margin-bottom:10px;}
.card{
background:#161b22;
padding:20px;
margin:20px auto;
max-width:500px;
border-radius:12px;
box-shadow:0 0 20px rgba(0,247,255,.15);
}
input,select{
padding:10px;margin:5px;border-radius:20px;border:none;text-align:center;
}
button{
padding:10px 20px;border:none;border-radius:20px;
cursor:pointer;background:#00f7ff;font-weight:bold;
}
button:hover{transform:scale(1.05);background:white;}
</style>
</head>

<body>

<h1>NeuroQuant IA</h1>
<p>APP Premium Ativado</p>

<div class="card">
<h2>Análise</h2>
<input type="text" id="pair" placeholder="Ex: BTCUSDT">
<select id="timeframe">
<option value="5">5m</option>
<option value="15">15m</option>
<option value="60">1h</option>
<option value="240">4h</option>
</select>
<br>
<button onclick="loadChart()">Carregar</button>
</div>

<div class="card">
<div id="chart"></div>
</div>

<div class="card">
<h2>Sinal Inteligente</h2>
<div id="signalBox">
<p>Premium Ativo ✔</p>
</div>
<button onclick="generateSignal()">Gerar Sinal</button>
</div>

<script>

if("serviceWorker" in navigator){
navigator.serviceWorker.register("service-worker.js");
}

function loadChart(){
let pair=document.getElementById("pair").value.toUpperCase();
let tf=document.getElementById("timeframe").value;
if(pair===""){alert("Digite um par");return;}

document.getElementById("chart").innerHTML="";

new TradingView.widget({
width:"100%",
height:400,
symbol:"BINANCE:"+pair,
interval:tf,
theme:"dark",
container_id:"chart"
});
}

function generateSignal(){
let rand=Math.random();
let signal,prob;

if(rand>0.6){
signal="COMPRA";
prob=Math.floor(70+Math.random()*20);
}else if(rand<0.4){
signal="VENDA";
prob=Math.floor(70+Math.random()*20);
}else{
signal="NEUTRO";
prob=Math.floor(50+Math.random()*10);
}

document.getElementById("signalBox").innerHTML=
"<h3>"+signal+"</h3><p>Probabilidade: "+prob+"%</p>";
}

</script>

</body>
</html>
