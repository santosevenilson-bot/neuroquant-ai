<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NeuroQuant PRO</title>

<style>
body{
    margin:0;
    font-family: 'Segoe UI', sans-serif;
    background:#0f172a;
    color:white;
}

header{
    background:#111827;
    padding:15px;
    display:flex;
    justify-content:space-between;
    align-items:center;
}

header h1{
    color:#00f5a0;
}

nav a{
    color:white;
    margin-left:20px;
    text-decoration:none;
    cursor:pointer;
}

.container{
    padding:30px;
}

.card{
    background:#1e293b;
    padding:20px;
    border-radius:10px;
    margin-bottom:20px;
}

input, select{
    padding:10px;
    width:100%;
    margin-top:10px;
    border-radius:5px;
    border:none;
}

button{
    background:#00f5a0;
    border:none;
    padding:10px 20px;
    border-radius:5px;
    margin-top:10px;
    cursor:pointer;
    font-weight:bold;
}

.hidden{
    display:none;
}

.price{
    font-size:24px;
    color:#00f5a0;
    font-weight:bold;
}
img{
    width:100%;
    border-radius:10px;
}
</style>
</head>
<body>

<header>
    <h1>NeuroQuant PRO</h1>
    <nav>
        <a onclick="showHome()">Home</a>
        <a onclick="showLogin()">Login</a>
        <a onclick="showPlano()">Plano PRO</a>
    </nav>
</header>

<div class="container">

    <!-- HOME -->
    <div id="home">
        <div class="card">
            <h2>Inteligência Artificial para Análise de Criptomoedas</h2>
            <img src="https://images.unsplash.com/photo-1621504450181-5fdb1e39c5c4" alt="IA e Criptomoeda">
            <p>Plataforma avançada de análise técnica com foco em liquidez, Fibonacci e fluxo institucional.</p>
        </div>

        <div class="card">
            <h3>Escolha ou Digite o Par</h3>
            
            <select id="cryptoSelect">
                <option>BTC/USDT</option>
                <option>ETH/USDT</option>
                <option>SOL/USDT</option>
                <option>RIVER/USDT</option>
            </select>

            <input type="text" id="customPair" placeholder="Ou digite outro par (Ex: XRP/USDT)">
            
            <button onclick="analisar()">Analisar</button>

            <div id="resultado"></div>
        </div>
    </div>

    <!-- LOGIN -->
    <div id="login" class="hidden">
        <div class="card">
            <h2>Área de Login</h2>
            <input type="email" placeholder="Seu email">
            <input type="password" placeholder="Sua senha">
            <button onclick="login()">Entrar</button>
        </div>
    </div>

    <!-- PLANO -->
    <div id="plano" class="hidden">
        <div class="card">
            <h2>Plano PRO</h2>
            <p>Acesso completo às análises avançadas</p>
            <p class="price">R$ 9,90 / mês</p>
            <button onclick="assinar()">Assinar com Pix</button>
            <p id="pagamento"></p>
        </div>
    </div>

</div>

<script>

let usuarioLogado = false;

function showHome(){
    document.getElementById('home').classList.remove('hidden');
    document.getElementById('login').classList.add('hidden');
    document.getElementById('plano').classList.add('hidden');
}

function showLogin(){
    document.getElementById('home').classList.add('hidden');
    document.getElementById('login').classList.remove('hidden');
    document.getElementById('plano').classList.add('hidden');
}

function showPlano(){
    document.getElementById('home').classList.add('hidden');
    document.getElementById('login').classList.add('hidden');
    document.getElementById('plano').classList.remove('hidden');
}

function login(){
    usuarioLogado = true;
    alert("Login realizado com sucesso!");
    showHome();
}

function analisar(){
    let select = document.getElementById("cryptoSelect").value;
    let custom = document.getElementById("customPair").value;

    let par = custom !== "" ? custom : select;

    document.getElementById("resultado").innerHTML =
        `<p>Análise iniciada para <strong>${par}</strong>...</p>
         <p>✔ Tendência: Alta moderada</p>
         <p>✔ Liquidez mapeada acima da máxima recente</p>
         <p>✔ Possível varredura antes de continuação</p>`;
}

function assinar(){
    if(!usuarioLogado){
        alert("Você precisa fazer login primeiro.");
        showLogin();
        return;
    }

    document.getElementById("pagamento").innerHTML =
        "Gerando QR Code Pix... (Integração backend necessária)";
}

</script>

</body>
</html>
