<!DOCTYPE html>
<html>
<head>
  <title>Detector de Crise BTC</title>
  <script src="https://cdn.jsdelivr.net/npm/technicalindicators/dist/browser.js"></script>
  <style>
    body { background:#0f172a; color:white; font-family:Arial; text-align:center; }
    .alert { font-size:22px; margin-top:20px; }
  </style>
</head>
<body>

<h1>Detector de Crise - BTC/USDT</h1>
<div id="status" class="alert">Carregando...</div>

<script>
async function fetchData() {
  const response = await fetch("https://api.binance.com/api/v3/klines?symbol=BTCUSDT&interval=1h&limit=250");
  const data = await response.json();
  
  const closes = data.map(c => parseFloat(c[4]));
  const volumes = data.map(c => parseFloat(c[5]));

  const ema21 = technicalindicators.EMA.calculate({ period: 21, values: closes });
  const ema50 = technicalindicators.EMA.calculate({ period: 50, values: closes });
  const ema200 = technicalindicators.EMA.calculate({ period: 200, values: closes });
  const rsi = technicalindicators.RSI.calculate({ period: 14, values: closes });

  const lastClose = closes[closes.length - 1];
  const lastEma21 = ema21[ema21.length - 1];
  const lastEma50 = ema50[ema50.length - 1];
  const lastEma200 = ema200[ema200.length - 1];
  const lastRsi = rsi[rsi.length - 1];

  const avgVolume = volumes.slice(-20).reduce((a,b)=>a+b)/20;
  const lastVolume = volumes[volumes.length - 1];

  let crisisScore = 0;

  if (lastEma21 < lastEma50 && lastEma50 < lastEma200) crisisScore++;
  if (lastRsi < 40) crisisScore++;
  if (lastVolume > avgVolume) crisisScore++;
  if (lastClose < lastEma200) crisisScore++;

  const statusDiv = document.getElementById("status");

  if (crisisScore >= 3) {
    statusDiv.innerHTML = "⚠️ ALERTA DE CRISE ATIVO (Short Bias)";
    statusDiv.style.color = "red";
  } else if (lastClose > lastEma50 && lastRsi > 50 && lastVolume > avgVolume) {
    statusDiv.innerHTML = "🚀 POSSÍVEL REVERSÃO (Long Bias)";
    statusDiv.style.color = "lime";
  } else {
    statusDiv.innerHTML = "🟡 Mercado Neutro";
    statusDiv.style.color = "yellow";
  }
}

fetchData();
setInterval(fetchData, 60000);
</script>

</body>
</html>
