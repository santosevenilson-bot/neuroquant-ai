<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NeuroQuant PRO</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600&display=swap" rel="stylesheet">

<style>
body{
    margin:0;
    background:#0f0f1a;
    font-family:'Orbitron',sans-serif;
    color:white;
}

/* ===== MENU PROFISSIONAL ===== */

.menu-btn{
    position:absolute;
    left:15px;
    top:15px;
    font-size:22px;
    cursor:pointer;
}

.sidebar{
    position:fixed;
    left:-280px;
    top:0;
    width:280px;
    height:100%;
    background:linear-gradient(180deg,#0f172a,#111827);
    transition:0.4s cubic-bezier(.77,0,.18,1);
    box-shadow:5px 0 25px rgba(0,255,255,0.15);
    z-index:1000;
    display:flex;
    flex-direction:column;
}

.sidebar.active{
    left:0;
}

.overlay{
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    background:rgba(0,0,0,0.6);
    opacity:0;
    pointer-events:none;
    transition:0.3s;
    z-index:900;
}

.overlay.active{
    opacity:1;
    pointer-events:auto;
}

.menu-header{
    padding:20px;
    border-bottom:1px solid #1f2937;
    position:relative;
}

.logo{
    font-size:18px;
    font-weight:600;
    color:#00f5ff;
}

.subtitle{
    font-size:12px;
    opacity:0.6;
}

.close-btn{
    position:absolute;
    right:15px;
    top:20px;
    cursor:pointer;
    font-size:16px;
    opacity:0.7;
}

.close-btn:hover{
    opacity:1;
    color:#00f5ff;
}

.sidebar a{
    display:flex;
    align-items:center;
    gap:12px;
    padding:15px 20px;
    color:white;
    text-decoration:none;
    font-size:14px;
    border-left:3px solid transparent;
    transition:0.3s;
}

.sidebar a span{
    font-size:16px;
}

.sidebar a:hover{
    background:#1f2937;
    border-left:3px solid #00f5ff;
    padding-left:25px;
}

.menu-footer{
    margin-top:auto;
    padding:15px 20px;
    font-size:12px;
    opacity:0.4;
}

/* ===== HEADER ===== */

header{
    background:linear-gradient(90deg,#00f5ff,#0066ff);
    padding:15px;
    text-align:center;
    font-size:20px;
    font-weight:600;
    position:relative;
}

/* ===== CONTAINER ===== */

.container{
    max-width:520px;
    margin:auto;
    padding:20px;
}

.card{
    background:#1a1a2e;
    padding:20px;
    border-radius:15px;
    box-shadow:0 0 20px rgba(0,255,255,0.2);
    margin-bottom:20px;
}

select{
    width:100%;
    padding:12px;
    border-radius:8px;
    border:none;
    margin-bottom:15px;
}

button{
    width:100%;
    padding:12px;
    border:none;
    border-radius:8px;
    background:linear-gradient(90deg,#00f5ff,#0066ff);
    color:white;
    font-weight:bold;
    cursor:pointer;
}

.badge{
    background:gold;
    color:black;
    padding:5px 10px;
    border-radius:5px;
    font-size:12px;
}

.footer{
    text-align:center;
    font-size:12px;
    opacity:0.6;
}

.loader{
    border:4px solid #1f2937;
    border-top:4px solid #00f5ff;
    border-radius:50%;
    width:30px;
    height:30px;
    animation:spin 1s linear infinite;
    margin:auto;
}

@keyframes spin{
    100%{transform:rotate(360deg);}
}

.signal span{
    animation:pulse 1.2s infinite;
}

@keyframes pulse{
    0%{opacity:1;}
    50%{opacity:0.4;}
    100%{opacity:1;}
}
</style>
</head>
<body>

<!-- MENU -->
<div class="sidebar" id="sidebar">

<div class="menu-header">
    <div class="logo">🧠 NeuroQuant</div>
    <div class="subtitle">IA Quantitativa</div>
    <div class="close-btn" onclick="toggleMenu()">✕</div>
</div>

<a href="#"><span>🏠</span> Início</a>
<a href="#"><span>📊</span> Mercado</a>
<a href="#"><span>⭐</span> Premium</a>
<a href="#"><span>📡</span> Scanner IA</a>
<a href="#"><span>⚙️</span> Configurações</a>
<a href="#"><span>❓</span> Suporte</a>

<div class="menu-footer">
    v6.0 PRO
</div>

</div>

<div class="overlay" id="overlay" onclick="toggleMenu()"></div>

<header>
<div class="menu-btn" onclick="toggleMenu()">☰</div>
🚀 NeuroQuant PRO – IA Avançada
</header>

<!-- CONTEÚDO ORIGINAL (INALTERADO) -->
<div class="container">

<div class="card">
<h3>Selecionar Criptomoeda</h3>
<select id="pairSelect"></select>
<button onclick="gerarSinal()">Analisar Mercado</button>
<div class="signal" id="resultado"></div>
</div>

<div class="card">
<h3>Área Premium <span class="badge">PRO</span></h3>
<a href="https://mpago.la/1DYvFBL" target="_blank">
<button>Assinar Agora – R$ 29,90</button>
</a>
</div>

<div class="footer">
NeuroQuant © 2026
</div>

</div>

<script>

function toggleMenu(){
    document.getElementById("sidebar").classList.toggle("active");
    document.getElementById("overlay").classList.toggle("active");
}

</script>

</body>
</html>
