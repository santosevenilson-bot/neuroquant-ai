<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NeuroQuant Pro</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600&display=swap" rel="stylesheet">

<style>
body{
    margin:0;
    background:#0f0f1a;
    font-family:'Orbitron',sans-serif;
    color:white;
}

header{
    background:linear-gradient(90deg,#00f5ff,#0066ff);
    padding:15px;
    text-align:center;
    font-size:20px;
    font-weight:600;
}

.container{
    max-width:500px;
    margin:auto;
    padding:20px;
}

.card{
    background:#1a1a2e;
    padding:20px;
    border-radius:15px;
    box-shadow:0 0 20px rgba(0,255,255,0.2);
    margin-bottom:20px;
}

input{
    width:100%;
    padding:12px;
    border-radius:8px;
    border:none;
    margin-bottom:15px;
    font-size:14px;
}

button{
    width:100%;
    padding:12px;
    border:none;
    border-radius:8px;
    background:linear-gradient(90deg,#00f5ff,#0066ff);
    color:white;
    font-weight:bold;
    cursor:pointer;
    transition:0.3s;
}

button:hover{
    opacity:0.8;
}

.signal{
    text-align:center;
    font-size:18px;
    margin-top:10px;
}

.premium-lock{
    text-align:center;
    opacity:0.6;
}

.badge{
    background:gold;
    color:black;
    padding:5px 10px;
    border-radius:5px;
    font-size:12px;
}

.footer{
    text-align:center;
    font-size:12px;
    opacity:0.6;
    margin-top:20px;
}
</style>
</head>
<body>

<header>
🚀 NeuroQuant PRO
</header>

<div class="container">

<div class="card">
<h3>Análise de Criptomoeda</h3>
<input type="text" id="pair" placeholder="Digite o par (Ex: BTC/USDT)">
<button onclick="gerarSinal()">Gerar Sinal</button>

<div class="signal" id="resultado"></div>
</div>

<div class="card">
<h3>Área Premium <span class="badge">PRO</span></h3>
<div class="premium-lock">
🔒 Estatísticas avançadas<br>
🔒 Sinais com 85%+ precisão<br>
🔒 Alertas automáticos<br><br>

<button onclick="pagar()">Desbloquear por R$ 9,90</button>
</div>
</div>

<div class="card">
<h3>Login</h3>
<input type="email" placeholder="Email">
<input type="password" placeholder="Senha">
<button>Entrar</button>
</div>

<div class="footer">
NeuroQuant © 2026
</div>

</div>

<script>
function gerarSinal(){
    let pair = document.getElementById("pair").value;
    if(pair==""){
        alert("Digite o par!");
        return;
    }

    let prob = Math.floor(Math.random()*30)+60;
    let tipo = Math.random()>0.5 ? "COMPRA 📈" : "VENDA 📉";

    document.getElementById("resultado").innerHTML=
    `
    Par: ${pair.toUpperCase()}<br>
    Sinal: <b>${tipo}</b><br>
    Probabilidade: ${prob}%<br>
    Alvo: ${Math.floor(Math.random()*50000)+20000}<br>
    Stop: ${Math.floor(Math.random()*50000)+20000}
    `;
}

function pagar(){
    window.location.href="https://www.mercadopago.com.br/checkout/v1/redirect?pref_id=SUA_PREFERENCE_ID";
}
</script>

</body>
</html>
