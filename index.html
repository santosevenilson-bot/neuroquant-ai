<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NeuroQuant AI | Plataforma Algorítmica</title>

<link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;600;700&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Rajdhani',sans-serif;}

body{
background:#0b0f1a;
color:#fff;
overflow-x:hidden;
}

/* MENU */
.menu-btn{
position:fixed;
top:20px;
left:20px;
font-size:30px;
cursor:pointer;
z-index:1001;
}

.overlay{
position:fixed;
width:100%;
height:100%;
background:rgba(0,0,0,0.6);
backdrop-filter:blur(5px);
display:none;
z-index:999;
}

.sidebar{
position:fixed;
top:0;
left:-280px;
width:280px;
height:100%;
background:#111827;
padding:30px 20px;
transition:.4s;
z-index:1000;
box-shadow:5px 0 30px rgba(0,255,255,0.2);
}

.sidebar.active{left:0;}
.overlay.active{display:block;}

.profile{
text-align:center;
margin-bottom:30px;
}

.profile img{
width:100px;
height:100px;
border-radius:50%;
object-fit:cover;
border:3px solid #00f0ff;
}

.sidebar a{
display:block;
padding:12px;
margin:10px 0;
color:#00f0ff;
border-radius:8px;
transition:.3s;
text-decoration:none;
cursor:pointer;
}

.sidebar a:hover{
background:linear-gradient(90deg,#00f0ff,#00ff88);
color:#000;
}

/* SEÇÕES */
section{
display:none;
padding:80px 20px;
text-align:center;
}

section.active{
display:block;
}

.panel{
background:#111827;
padding:25px;
border-radius:15px;
margin:20px auto;
max-width:800px;
box-shadow:0 0 25px rgba(0,255,255,0.08);
}

input, textarea, select{
padding:10px;
margin:10px 0;
border-radius:8px;
border:none;
width:100%;
font-size:16px;
}

button{
padding:10px 20px;
background:#00f0ff;
border:none;
border-radius:20px;
cursor:pointer;
font-weight:bold;
}
</style>
</head>

<body>

<div class="menu-btn" onclick="abrirMenu()">☰</div>
<div class="overlay" id="overlay" onclick="fecharMenu()"></div>

<div class="sidebar" id="sidebar">
<div class="profile">
<img src="foto.png" alt="Minha Foto">
<h3>Evenilson</h3>
</div>

<a onclick="mostrarAba('dashboard')">Dashboard</a>
<a onclick="mostrarAba('sinais')">Sinais</a>
<a onclick="mostrarAba('mercado')">Mercado</a>
<a onclick="mostrarAba('config')">Configurações</a>
</div>

<!-- DASHBOARD -->
<section id="dashboard" class="active">
<div class="panel">
<h2>Dashboard</h2>
<input type="text" placeholder="Digite um título">
<textarea placeholder="Digite algo para seu dashboard"></textarea>
<button>Salvar</button>
</div>
</section>

<!-- SINAIS -->
<section id="sinais">
<div class="panel">
<h2>Sinais</h2>
<input type="text" placeholder="Digite o par (Ex: BTCUSDT)">
<textarea placeholder="Anotações ou estratégia"></textarea>
<button>Executar</button>
</div>
</section>

<!-- MERCADO -->
<section id="mercado">
<div class="panel">
<h2>Mercado</h2>
<input type="text" placeholder="Pesquisar ativo">
<textarea placeholder="Observações sobre o mercado"></textarea>
<button>Analisar</button>
</div>
</section>

<!-- CONFIG -->
<section id="config">
<div class="panel">
<h2>Configurações</h2>
<input type="text" placeholder="Nome do usuário">
<input type="password" placeholder="Nova senha">
<button>Salvar Configurações</button>
</div>
</section>

<script>

function abrirMenu(){
document.getElementById("sidebar").classList.add("active");
document.getElementById("overlay").classList.add("active");
}

function fecharMenu(){
document.getElementById("sidebar").classList.remove("active");
document.getElementById("overlay").classList.remove("active");
}

function mostrarAba(id){

document.querySelectorAll("section").forEach(sec=>{
sec.classList.remove("active");
});

document.getElementById(id).classList.add("active");

fecharMenu();
}

</script>

</body>
</html>
