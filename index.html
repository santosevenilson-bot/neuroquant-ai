<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NeuroQuant PRO</title>

<style>
body{
    margin:0;
    font-family: Arial, sans-serif;
    background:#0a0f24;
    color:white;
}

header{
    background:#081028;
    padding:15px;
    display:flex;
    justify-content:space-between;
    align-items:center;
}

header h1{
    color:#00dbb8;
}

nav a{
    color:white;
    margin-left:20px;
    cursor:pointer;
    text-decoration:none;
}

.container{
    padding:30px;
}

.card{
    background:#112144;
    padding:20px;
    border-radius:10px;
    margin-bottom:20px;
}

input, select{
    padding:10px;
    width:100%;
    margin-top:10px;
    border-radius:5px;
    border:none;
}

button{
    background:#00dbb8;
    border:none;
    padding:10px 20px;
    border-radius:5px;
    margin-top:10px;
    cursor:pointer;
    font-weight:bold;
}

.hidden{
    display:none;
}
</style>
</head>
<body>

<header>
    <h1>NeuroQuant PRO</h1>
    <nav>
        <a onclick="showHome()">Home</a>
        <a onclick="showLogin()">Login</a>
        <a onclick="showPlano()">Plano PRO</a>
    </nav>
</header>

<div class="container">

    <!-- HOME -->
    <div id="home">
        <div class="card">
            <h2>Analise de Criptomoedas em Tempo Real</h2>
            <p>Selecione um par ou digite outro:</p>

            <select id="binancePairs"></select>
            <input type="text" id="customPair" placeholder="Digite outro par (Ex: XRP/USDT)">
            <button onclick="analisar()">Analisar</button>

            <div id="resultado"></div>
        </div>
    </div>

    <!-- LOGIN -->
    <div id="login" class="hidden">
        <div class="card">
            <h2>Área de Login</h2>
            <input type="email" placeholder="Seu email">
            <input type="password" placeholder="Sua senha">
            <button onclick="login()">Entrar</button>
        </div>
    </div>

    <!-- PLANO -->
    <div id="plano" class="hidden">
        <div class="card">
            <h2>Plano PRO - R$ 9,90</h2>
            <p>Pagamento via Pix em desenvolvimento backend</p>
        </div>
    </div>

</div>

<script>

// Função pra mostrar as telas
function showHome(){
    document.getElementById('home').classList.remove('hidden');
    document.getElementById('login').classList.add('hidden');
    document.getElementById('plano').classList.add('hidden');
}
function showLogin(){
    document.getElementById('home').classList.add('hidden');
    document.getElementById('login').classList.remove('hidden');
    document.getElementById('plano').classList.add('hidden');
}
function showPlano(){
    document.getElementById('home').classList.add('hidden');
    document.getElementById('login').classList.add('hidden');
    document.getElementById('plano').classList.remove('hidden');
}

// Busca pares da Binance automaticamente
fetch('https://api.binance.com/api/v3/exchangeInfo')
.then(response => response.json())
.then(data => {
    let select = document.getElementById('binancePairs');
    data.symbols.forEach(symbol => {
        if(symbol.status === "TRADING"){
            let option = document.createElement("option");
            option.value = symbol.symbol;
            option.text = symbol.symbol;
            select.add(option);
        }
    });
})
.catch(err => {
    console.error("Erro ao carregar pares:", err);
});

// Função de análise (simulada)
function analisar(){
    let select = document.getElementById("binancePairs").value;
    let custom = document.getElementById("customPair").value;
    let par = custom !== "" ? custom.toUpperCase() : select;

    document.getElementById("resultado").innerHTML =
        `<p>🔍 Analisando: <strong>${par}</strong></p>
         <p>Tendência: Alta moderada</p>
         <p>Liquidez: Forte</p>`;
}

// Login simulado
function login(){
    alert("Login realizado com sucesso!");
    showHome();
}

</script>

</body>
</html>
