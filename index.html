<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Crypto Tech</title>

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: 'Segoe UI', sans-serif;
}

body {
    height: 100vh;
    background: url("fundo.png") no-repeat center center fixed;
    background-size: cover;
    overflow-x: hidden;
    color: white;
}

/* Overlay escuro futurista */
body::before {
    content: "";
    position: fixed;
    width: 100%;
    height: 100%;
    background: rgba(0,0,0,0.75);
    backdrop-filter: blur(4px);
    z-index: -1;
}

/* Botão menu */
.menu-btn {
    position: fixed;
    top: 20px;
    left: 20px;
    font-size: 28px;
    cursor: pointer;
    z-index: 1001;
    transition: 0.3s;
}

.menu-btn:hover {
    color: #00f7ff;
    transform: scale(1.1);
}

/* Menu lateral */
.sidebar {
    position: fixed;
    top: 0;
    left: -260px;
    width: 260px;
    height: 100%;
    background: rgba(0,0,0,0.95);
    padding-top: 80px;
    transition: 0.4s ease;
    box-shadow: 0 0 20px #00f7ff;
}

.sidebar a {
    display: block;
    padding: 15px 25px;
    color: #00f7ff;
    text-decoration: none;
    transition: 0.3s;
}

.sidebar a:hover {
    background: #00f7ff;
    color: black;
}

.sidebar.active {
    left: 0;
}

/* Conteúdo central */
.container {
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
}

/* Card futurista */
.card {
    background: rgba(255,255,255,0.08);
    border: 1px solid rgba(255,255,255,0.2);
    backdrop-filter: blur(12px);
    padding: 40px;
    border-radius: 20px;
    text-align: center;
    width: 400px;
    box-shadow: 0 0 30px rgba(0,255,255,0.3);
    animation: glow 3s infinite alternate;
}

.card h1 {
    font-size: 28px;
    margin-bottom: 15px;
    color: #00f7ff;
}

.card p {
    font-size: 14px;
    opacity: 0.8;
}

/* Botão futurista */
.btn {
    margin-top: 25px;
    padding: 12px 25px;
    border: none;
    border-radius: 30px;
    background: linear-gradient(45deg, #00f7ff, #005eff);
    color: white;
    cursor: pointer;
    transition: 0.4s;
}

.btn:hover {
    transform: scale(1.1);
    box-shadow: 0 0 20px #00f7ff;
}

/* Animação glow */
@keyframes glow {
    from {
        box-shadow: 0 0 15px rgba(0,255,255,0.3);
    }
    to {
        box-shadow: 0 0 35px rgba(0,255,255,0.8);
    }
}

/* Linhas animadas estilo hacker */
.lines {
    position: fixed;
    width: 100%;
    height: 100%;
    pointer-events: none;
    background-image: repeating-linear-gradient(
        0deg,
        rgba(0,255,255,0.05) 0px,
        rgba(0,255,255,0.05) 1px,
        transparent 1px,
        transparent 3px
    );
    animation: moveLines 3s linear infinite;
}

@keyframes moveLines {
    from { background-position: 0 0; }
    to { background-position: 0 100px; }
}
</style>
</head>

<body>

<div class="lines"></div>

<div class="menu-btn" onclick="toggleMenu()">☰</div>

<div class="sidebar" id="menu">
    <a href="#">Dashboard</a>
    <a href="#">Inteligência Artificial</a>
    <a href="#">Criptomoedas</a>
    <a href="#">Segurança</a>
    <a href="#">Contato</a>
</div>

<div class="container">
    <div class="card">
        <h1>AI & Blockchain System</h1>
        <p>Monitoramento avançado de Inteligência Artificial e Criptomoedas com segurança de nível militar.</p>
        <button class="btn">Acessar Sistema</button>
    </div>
</div>

<script>
function toggleMenu() {
    document.getElementById("menu").classList.toggle("active");
}
</script>

</body>
</html>
