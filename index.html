<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NeuroQuant AI</title>

<style>
body{
margin:0;
font-family:Arial, sans-serif;
background:linear-gradient(135deg,#0f172a,#020617);
color:white;
text-align:center;
}

/* MENU */
.menu-btn{
position:fixed;
top:20px;
left:20px;
font-size:30px;
cursor:pointer;
z-index:1001;
}

.sidebar{
position:fixed;
top:0;
left:-250px;
width:250px;
height:100%;
background:#0b1220;
padding-top:80px;
transition:0.3s;
z-index:1000;
text-align:left;
}

.sidebar a{
display:block;
padding:15px 25px;
color:white;
text-decoration:none;
font-size:18px;
}

.sidebar a:hover{
background:#1e293b;
}

.overlay{
position:fixed;
display:none;
width:100%;
height:100%;
background:rgba(0,0,0,0.6);
top:0;
left:0;
z-index:900;
}

header{
padding:120px 20px 80px;
}

h1{
font-size:48px;
}

.subtitle{
color:#94a3b8;
max-width:700px;
margin:20px auto;
font-size:20px;
}

section{
padding:80px 20px;
}

canvas{
background:#0b1220;
border-radius:12px;
max-width:90%;
}

footer{
padding:30px;
background:#000;
color:#64748b;
margin-top:40px;
}
</style>
</head>

<body>

<div class="menu-btn" onclick="openMenu()">☰</div>

<div id="sidebar" class="sidebar">
<a href="#">Home</a>
<a href="#padroes">PADRÕES DE ALTA</a>
<a href="#">Contato</a>
</div>

<div id="overlay" class="overlay" onclick="closeMenu()"></div>

<header>
<h1>NeuroQuant AI</h1>
<p class="subtitle">
Plataforma avançada de previsão de sinais com Inteligência Artificial e análise quantitativa.
</p>
</header>

<section id="padroes">
<h2>Simulação de Padrão de Alta (Fundo Duplo)</h2>
<canvas id="chartCanvas" width="800" height="400"></canvas>
</section>

<footer>
© 2026 NeuroQuant AI
</footer>

<script>

/* MENU */
function openMenu(){
document.getElementById("sidebar").style.left="0";
document.getElementById("overlay").style.display="block";
}

function closeMenu(){
document.getElementById("sidebar").style.left="-250px";
document.getElementById("overlay").style.display="none";
}

/* ANIMAÇÃO DO GRÁFICO */
window.onload = function(){

const canvas = document.getElementById("chartCanvas");
const ctx = canvas.getContext("2d");

let points = [
{ x: 50, y: 200 },
{ x: 150, y: 300 },
{ x: 250, y: 150 },
{ x: 350, y: 300 },
{ x: 450, y: 150 },
{ x: 550, y: 120 },
{ x: 650, y: 80 }
];

let index = 0;

function drawNext(){
if(index >= points.length - 1) return;

ctx.beginPath();
ctx.moveTo(points[index].x, points[index].y);
ctx.lineTo(points[index+1].x, points[index+1].y);
ctx.strokeStyle = "#22c55e";
ctx.lineWidth = 3;
ctx.stroke();

index++;
setTimeout(drawNext, 600);
}

drawNext();

};

</script>

</body>
</html>
