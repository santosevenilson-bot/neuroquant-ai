<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NeuroQuant AI</title>

<style>
body{
margin:0;
font-family:Arial, sans-serif;
background:linear-gradient(135deg,#0f172a,#020617);
color:white;
text-align:center;
overflow-x:hidden;
}

/* MENU */
.menu-btn{
position:fixed;
top:20px;
left:20px;
font-size:30px;
cursor:pointer;
z-index:1001;
}

.sidebar{
position:fixed;
top:0;
left:-260px;
width:260px;
height:100%;
background:#0b1220;
padding-top:80px;
transition:0.3s;
z-index:1000;
text-align:left;
}

.sidebar a{
display:block;
padding:15px 25px;
color:white;
text-decoration:none;
font-size:18px;
}

.sidebar a:hover{
background:#1e293b;
}

.overlay{
position:fixed;
display:none;
width:100%;
height:100%;
background:rgba(0,0,0,0.6);
top:0;
left:0;
z-index:900;
}

section{
padding:100px 20px;
display:none;
}

.active{
display:block;
}

canvas{
background:#0b1220;
border-radius:12px;
margin-top:40px;
max-width:95%;
}

button{
margin-top:20px;
padding:12px 25px;
background:#22c55e;
border:none;
border-radius:8px;
color:white;
cursor:pointer;
}

footer{
padding:30px;
background:#000;
color:#64748b;
margin-top:40px;
}
</style>
</head>

<body>

<div class="menu-btn" onclick="openMenu()">☰</div>

<div id="sidebar" class="sidebar">
<a href="#" onclick="showHome()">Home</a>
<a href="#" onclick="showPatterns()">PADRÕES DE ALTA</a>
</div>

<div id="overlay" class="overlay" onclick="closeMenu()"></div>

<!-- HOME -->
<section id="home" class="active">
<h1>NeuroQuant AI</h1>
<p>Plataforma avançada de previsão de sinais com Inteligência Artificial.</p>
</section>

<!-- PADRÕES -->
<section id="patterns">
<h2>Padrão de Alta — Fundo Duplo</h2>
<canvas id="chartCanvas" width="900" height="450"></canvas>
<button onclick="restartAnimation()">Gerar Novo Padrão</button>
</section>

<footer>
© 2026 NeuroQuant AI
</footer>

<script>

/* MENU */
function openMenu(){
document.getElementById("sidebar").style.left="0";
document.getElementById("overlay").style.display="block";
}

function closeMenu(){
document.getElementById("sidebar").style.left="-260px";
document.getElementById("overlay").style.display="none";
}

function showHome(){
document.getElementById("home").classList.add("active");
document.getElementById("patterns").classList.remove("active");
closeMenu();
}

function showPatterns(){
document.getElementById("patterns").classList.add("active");
document.getElementById("home").classList.remove("active");
closeMenu();
}

/* CANDLE ANIMATION */
const canvas = document.getElementById("chartCanvas");
const ctx = canvas.getContext("2d");

let candles;
let index;

function generatePattern(){
return [
[200,220],[220,260],[260,180],[180,260],
[260,180],[180,160],[160,140],[140,120]
];
}

function drawCandle(x, open, close){
let color = close > open ? "#22c55e" : "#ef4444";
ctx.strokeStyle = color;
ctx.fillStyle = color;

let top = Math.min(open, close);
let bottom = Math.max(open, close);

ctx.fillRect(x, top, 10, bottom-top);
ctx.beginPath();
ctx.moveTo(x+5, top-15);
ctx.lineTo(x+5, bottom+15);
ctx.stroke();
}

function animate(){
if(index >= candles.length) return;

let x = 80 + index*60;
let open = candles[index][0];
let close = candles[index][1];

drawCandle(x, open, close);
index++;
setTimeout(animate, 500);
}

function restartAnimation(){
ctx.clearRect(0,0,canvas.width,canvas.height);
candles = generatePattern();
index = 0;
animate();
}

restartAnimation();

</script>

</body>
</html>
