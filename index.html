<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NeuroQuant PRO</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Inter', sans-serif;
}

body{
background:#0b0f1c;
color:white;
}

/* TOPBAR */
.topbar{
height:70px;
background:#111827;
display:flex;
justify-content:space-between;
align-items:center;
padding:0 30px;
border-bottom:1px solid #1f2937;
}

.logo{
font-size:20px;
font-weight:bold;
background:linear-gradient(90deg,#00f5c3,#00aaff);
-webkit-background-clip:text;
-webkit-text-fill-color:transparent;
}

.menu{
display:flex;
gap:20px;
}

.menu span{
cursor:pointer;
color:#9ca3af;
}

.menu span:hover{
color:white;
}

/* LAYOUT */
.wrapper{
display:grid;
grid-template-columns: 1fr 350px;
gap:20px;
padding:30px;
}

/* CARDS */
.card{
background:#111827;
padding:20px;
border-radius:15px;
border:1px solid #1f2937;
box-shadow:0 0 20px rgba(0,255,200,0.05);
}

.card h3{
margin-bottom:15px;
color:#00f5c3;
}

input, select{
width:100%;
padding:10px;
margin-top:10px;
border-radius:8px;
border:none;
background:#1f2937;
color:white;
}

button{
width:100%;
padding:12px;
margin-top:10px;
border:none;
border-radius:10px;
background:linear-gradient(90deg,#00f5c3,#00aaff);
color:black;
font-weight:bold;
cursor:pointer;
}

.grid-indicators{
display:grid;
grid-template-columns:repeat(2,1fr);
gap:15px;
margin-top:15px;
}

.indicator-box{
background:#0f172a;
padding:15px;
border-radius:10px;
text-align:center;
}

.alta{ color:#00ff88; font-weight:bold;}
.baixa{ color:#ff4d4d; font-weight:bold;}
.neutro{ color:#ffd000; font-weight:bold;}

canvas{
background:white;
border-radius:15px;
}

@media(max-width:900px){
.wrapper{
grid-template-columns:1fr;
}
}
</style>
</head>
<body>

<div class="topbar">
<div class="logo">NeuroQuant PRO</div>
<div class="menu">
<span>Dashboard</span>
<span>Mercado</span>
<span>Plano PRO</span>
</div>
</div>

<div class="wrapper">

<!-- AREA PRINCIPAL -->
<div class="card">
<h3>Gráfico</h3>
<canvas id="grafico"></canvas>
</div>

<!-- LATERAL -->
<div class="card">
<h3>Análise Técnica</h3>

<select id="binancePairs"></select>
<input type="text" id="customPair" placeholder="Ou digite outro par (ex: XRPUSDT)">
<button onclick="analisar()">Analisar</button>

<div class="grid-indicators" id="indicadores"></div>

</div>

</div>

<script>

// Carregar pares automaticamente
fetch('https://api.binance.com/api/v3/exchangeInfo')
.then(res=>res.json())
.then(data=>{
let select=document.getElementById("binancePairs");
data.symbols.forEach(s=>{
if(s.status==="TRADING"){
let opt=document.createElement("option");
opt.value=s.symbol;
opt.text=s.symbol;
select.add(opt);
}
});
});

function calcularEMA(periodo,dados){
let k=2/(periodo+1);
let ema=[dados[0]];
for(let i=1;i<dados.length;i++){
ema.push(dados[i]*k+ema[i-1]*(1-k));
}
return ema;
}

function calcularRSI(periodo,dados){
let ganhos=0,perdas=0;
for(let i=1;i<=periodo;i++){
let diff=dados[i]-dados[i-1];
if(diff>=0) ganhos+=diff;
else perdas+=Math.abs(diff);
}
let rs=ganhos/perdas;
return 100-(100/(1+rs));
}

async function analisar(){

let select=document.getElementById("binancePairs").value;
let custom=document.getElementById("customPair").value;
let par=custom!==""?custom.toUpperCase():select;

let url=`https://api.binance.com/api/v3/klines?symbol=${par}&interval=1h&limit=100`;
let response=await fetch(url);
let data=await response.json();

let closes=data.map(c=>parseFloat(c[4]));
let highs=data.map(c=>parseFloat(c[2]));
let lows=data.map(c=>parseFloat(c[3]));

let ema9=calcularEMA(9,closes);
let ema21=calcularEMA(21,closes);
let rsi=calcularRSI(14,closes);

let tendencia="Neutro";
let classe="neutro";

if(ema9.at(-1)>ema21.at(-1)&&rsi>55){
tendencia="Alta 🚀";
classe="alta";
}
else if(ema9.at(-1)<ema21.at(-1)&&rsi<45){
tendencia="Baixa 📉";
classe="baixa";
}

let max=Math.max(...highs);
let min=Math.min(...lows);

let fib50=(min+(max-min)*0.5).toFixed(2);
let fib618=(min+(max-min)*0.618).toFixed(2);

document.getElementById("indicadores").innerHTML=`
<div class="indicator-box">EMA 9<br>${ema9.at(-1).toFixed(2)}</div>
<div class="indicator-box">EMA 21<br>${ema21.at(-1).toFixed(2)}</div>
<div class="indicator-box">RSI<br>${rsi.toFixed(2)}</div>
<div class="indicator-box ${classe}">Tendência<br>${tendencia}</div>
<div class="indicator-box">Fibo 50%<br>${fib50}</div>
<div class="indicator-box">Fibo 61.8%<br>${fib618}</div>
`;

new Chart(document.getElementById("grafico"),{
type:'line',
data:{
labels:closes.map((_,i)=>i),
datasets:[{label:par,data:closes}]
}
});

}

</script>

</body>
</html>
