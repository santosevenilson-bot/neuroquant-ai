<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NeuroQuant PRO</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600&display=swap" rel="stylesheet">

<style>
body{
    margin:0;
    background:#0f0f1a;
    font-family:'Orbitron',sans-serif;
    color:white;
}

/* MENU */
.menu-btn{
    position:absolute;
    left:15px;
    top:15px;
    font-size:22px;
    cursor:pointer;
}

.sidebar{
    position:fixed;
    left:-250px;
    top:0;
    width:250px;
    height:100%;
    background:#111827;
    padding-top:60px;
    transition:0.3s;
    box-shadow:5px 0 20px rgba(0,255,255,0.2);
    z-index:1000;
}

.sidebar a{
    display:block;
    padding:15px;
    color:white;
    text-decoration:none;
    border-bottom:1px solid #1f2937;
}

.sidebar a:hover{
    background:#1f2937;
}

.sidebar.active{
    left:0;
}

/* HEADER */
header{
    background:linear-gradient(90deg,#00f5ff,#0066ff);
    padding:15px;
    text-align:center;
    font-size:20px;
    font-weight:600;
    position:relative;
}

/* CONTAINER */
.container{
    max-width:520px;
    margin:auto;
    padding:20px;
}

.card{
    background:#1a1a2e;
    padding:20px;
    border-radius:15px;
    box-shadow:0 0 20px rgba(0,255,255,0.2);
    margin-bottom:20px;
}

select{
    width:100%;
    padding:12px;
    border-radius:8px;
    border:none;
    margin-bottom:15px;
    font-size:14px;
}

button{
    width:100%;
    padding:12px;
    border:none;
    border-radius:8px;
    background:linear-gradient(90deg,#00f5ff,#0066ff);
    color:white;
    font-weight:bold;
    cursor:pointer;
    transition:0.3s;
}

button:hover{
    opacity:0.85;
}

.signal{
    font-size:14px;
    margin-top:15px;
    line-height:1.6;
}

.badge{
    background:gold;
    color:black;
    padding:5px 10px;
    border-radius:5px;
    font-size:12px;
}

.footer{
    text-align:center;
    font-size:12px;
    opacity:0.6;
    margin-top:20px;
}
</style>
</head>
<body>

<div class="sidebar" id="sidebar">
<a href="#">🏠 Início</a>
<a href="#">📊 Mercado</a>
<a href="#">⭐ Premium</a>
<a href="#">⚙️ Configurações</a>
<a href="#">❓ Suporte</a>
</div>

<header>
<div class="menu-btn" onclick="toggleMenu()">☰</div>
🚀 NeuroQuant PRO – Mercado em Tempo Real
</header>

<div class="container">

<div class="card">
<h3>Selecionar Criptomoeda</h3>
<select id="pairSelect"></select>
<button onclick="gerarSinal()">Analisar Mercado</button>
<div class="signal" id="resultado"></div>
</div>

<div class="card">
<h3>Área Premium <span class="badge">PRO</span></h3>
<a href="https://mpago.la/1DYvFBL" target="_blank">
<button>Assinar Agora – R$ 29,90</button>
</a>
</div>

<div class="footer">
NeuroQuant © 2026
</div>

</div>

<script>

function toggleMenu(){
    document.getElementById("sidebar").classList.toggle("active");
}

let intervaloAtualizacao;
let pares = [];

async function carregarPares(){
    let response = await fetch("https://api.binance.com/api/v3/exchangeInfo");
    let data = await response.json();

    pares = data.symbols
        .filter(s => s.quoteAsset === "USDT" && s.status === "TRADING")
        .map(s => s.symbol);

    let select = document.getElementById("pairSelect");

    pares.forEach(par=>{
        let option = document.createElement("option");
        option.value = par;
        option.textContent = par;
        select.appendChild(option);
    });
}

async function buscarDados(par){
    let priceReq = await fetch(`https://api.binance.com/api/v3/ticker/price?symbol=${par}`);
    let priceData = await priceReq.json();

    let statsReq = await fetch(`https://api.binance.com/api/v3/ticker/24hr?symbol=${par}`);
    let statsData = await statsReq.json();

    return {
        preco: parseFloat(priceData.price),
        high: parseFloat(statsData.highPrice),
        low: parseFloat(statsData.lowPrice)
    };
}

async function gerarSinal(){

    let par = document.getElementById("pairSelect").value;
    let dados = await buscarDados(par);

    let preco = dados.preco;
    let high = dados.high;
    let low = dados.low;

    let fib236 = (high - (high - low) * 0.236).toFixed(2);
    let fib382 = (high - (high - low) * 0.382).toFixed(2);
    let fib50  = (high - (high - low) * 0.5).toFixed(2);
    let fib618 = (high - (high - low) * 0.618).toFixed(2);

    let posicao = (preco - low) / (high - low);

    let tipo, tendencia, prob, alvo, stop;

    if(posicao < 0.3){
        tipo = "COMPRA 📈";
        tendencia = "Preço próximo ao suporte";
        prob = 82;
        alvo = high.toFixed(2);
        stop = fib618;
    }
    else if(posicao > 0.7){
        tipo = "VENDA 📉";
        tendencia = "Preço próximo à resistência";
        prob = 82;
        alvo = low.toFixed(2);
        stop = fib382;
    }
    else{
        tipo = "NEUTRO ⚖️";
        tendencia = "Zona intermediária";
        prob = 60;
        alvo = fib50;
        stop = fib50;
    }

    atualizarTela(par, preco, high, low, tipo, tendencia, prob, alvo, stop, fib236, fib382, fib50, fib618);

    clearInterval(intervaloAtualizacao);

    intervaloAtualizacao = setInterval(async ()=>{
        let dadosAtualizados = await buscarDados(par);
        atualizarTela(par,
            dadosAtualizados.preco,
            dadosAtualizados.high,
            dadosAtualizados.low,
            tipo,
            tendencia,
            prob,
            alvo,
            stop,
            fib236,
            fib382,
            fib50,
            fib618
        );
    },5000);
}

function atualizarTela(par, preco, high, low, tipo, tendencia, prob, alvo, stop, fib236, fib382, fib50, fib618){

    document.getElementById("resultado").innerHTML = `
    Par: ${par}<br><br>
    💰 Preço Atual: ${preco.toFixed(2)}<br>
    📊 High 24h: ${high.toFixed(2)}<br>
    📊 Low 24h: ${low.toFixed(2)}<br><br>

    🔥 <b>Sinal:</b> ${tipo}<br>
    🎯 <b>Probabilidade:</b> ${prob}%<br>
    🧠 ${tendencia}<br><br>

    🎯 <b>Alvo:</b> ${alvo}<br>
    🛑 <b>Stop:</b> ${stop}<br><br>

    📐 Fibonacci:<br>
    0.236 → ${fib236}<br>
    0.382 → ${fib382}<br>
    0.5 → ${fib50}<br>
    0.618 → ${fib618}<br><br>

    🔄 Atualizando automaticamente...
    `;
}

carregarPares();

</script>

</body>
</html>
