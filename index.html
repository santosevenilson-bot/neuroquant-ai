<script>

async function buscarPrecoReal(par){
    try{
        let simbolo = par.replace("/","").toUpperCase(); 
        let response = await fetch(`https://api.binance.com/api/v3/ticker/price?symbol=${simbolo}`);
        let data = await response.json();

        return parseFloat(data.price);
    }catch(error){
        alert("Par inválido ou erro ao buscar preço.");
        return null;
    }
}

async function gerarSinal(){

    let pair = document.getElementById("pair").value;
    if(pair==""){
        alert("Digite o par!");
        return;
    }

    let precoAtual = await buscarPrecoReal(pair);
    if(!precoAtual) return;

    let movimento = Math.random();

    let tendencia;
    let tipo;
    let prob;
    let topo;
    let fundo;

    if(movimento > 0.6){
        tendencia = "📈 Tendência de Alta";
        tipo = "COMPRA";
        prob = Math.floor(Math.random()*10)+78;

        fundo = precoAtual - (precoAtual * 0.02);
        topo = precoAtual + (precoAtual * 0.03);

    } else if(movimento < 0.4){
        tendencia = "📉 Tendência de Baixa";
        tipo = "VENDA";
        prob = Math.floor(Math.random()*10)+78;

        topo = precoAtual + (precoAtual * 0.02);
        fundo = precoAtual - (precoAtual * 0.03);

    } else {
        tendencia = "⚖️ Consolidação";
        tipo = "NEUTRO";
        prob = Math.floor(Math.random()*10)+55;

        topo = precoAtual + (precoAtual * 0.01);
        fundo = precoAtual - (precoAtual * 0.01);
    }

    // Fibonacci real baseado no preço atual
    let fib236 = (topo - (topo - fundo) * 0.236).toFixed(2);
    let fib382 = (topo - (topo - fundo) * 0.382).toFixed(2);
    let fib50  = (topo - (topo - fundo) * 0.5).toFixed(2);
    let fib618 = (topo - (topo - fundo) * 0.618).toFixed(2);

    let alvo, stop;

    if(tipo === "COMPRA"){
        alvo = topo.toFixed(2);
        stop = fib618;
    }
    else if(tipo === "VENDA"){
        alvo = fundo.toFixed(2);
        stop = fib382;
    }
    else{
        alvo = fib50;
        stop = fib50;
    }

    document.getElementById("resultado").innerHTML=
    `
    Par: ${pair.toUpperCase()}<br><br>

    💰 <b>Preço Atual (Binance):</b> ${precoAtual.toFixed(2)}<br>
    ${tendencia}<br><br>

    🔥 <b>Sinal:</b> ${tipo}<br>
    🎯 <b>Probabilidade:</b> ${prob}%<br><br>

    🎯 <b>Alvo Técnico:</b> ${alvo}<br>
    🛑 <b>Stop Técnico:</b> ${stop}<br><br>

    📊 <b>Níveis Fibonacci:</b><br>
    0.236 → ${fib236}<br>
    0.382 → ${fib382}<br>
    0.5 → ${fib50}<br>
    0.618 → ${fib618}
    `;
}

</script>
