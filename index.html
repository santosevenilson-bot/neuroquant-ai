<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NeuroQuant PRO</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600&display=swap" rel="stylesheet">

<style>
body{
    margin:0;
    background:#0f0f1a;
    font-family:'Orbitron',sans-serif;
    color:white;
}

/* MENU */
.menu-btn{
    position:absolute;
    left:15px;
    top:15px;
    font-size:22px;
    cursor:pointer;
}

.sidebar{
    position:fixed;
    left:-250px;
    top:0;
    width:250px;
    height:100%;
    background:#111827;
    padding-top:60px;
    transition:0.3s;
    box-shadow:5px 0 20px rgba(0,255,255,0.2);
    z-index:1000;
}

.sidebar a{
    display:block;
    padding:15px;
    color:white;
    text-decoration:none;
    border-bottom:1px solid #1f2937;
}

.sidebar a:hover{
    background:#1f2937;
}

.sidebar.active{
    left:0;
}

.overlay{
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    background:rgba(0,0,0,0.6);
    opacity:0;
    pointer-events:none;
    transition:0.3s;
    z-index:900;
}

.overlay.active{
    opacity:1;
    pointer-events:auto;
}

/* HEADER */
header{
    background:linear-gradient(90deg,#00f5ff,#0066ff);
    padding:15px;
    text-align:center;
    font-size:20px;
    font-weight:600;
    position:relative;
}

/* CONTAINER */
.container{
    max-width:520px;
    margin:auto;
    padding:20px;
}

.card{
    background:#1a1a2e;
    padding:20px;
    border-radius:15px;
    box-shadow:0 0 20px rgba(0,255,255,0.2);
    margin-bottom:20px;
    transition:0.3s;
}

.card:hover{
    transform:translateY(-4px);
    box-shadow:0 0 30px rgba(0,255,255,0.4);
}

select{
    width:100%;
    padding:12px;
    border-radius:8px;
    border:none;
    margin-bottom:15px;
}

button{
    width:100%;
    padding:12px;
    border:none;
    border-radius:8px;
    background:linear-gradient(90deg,#00f5ff,#0066ff);
    color:white;
    font-weight:bold;
    cursor:pointer;
}

.loader{
    border:4px solid #1f2937;
    border-top:4px solid #00f5ff;
    border-radius:50%;
    width:30px;
    height:30px;
    animation:spin 1s linear infinite;
    margin:auto;
}

@keyframes spin{
    100%{transform:rotate(360deg);}
}

.signal span{
    animation:pulse 1.2s infinite;
}

@keyframes pulse{
    0%{opacity:1;}
    50%{opacity:0.4;}
    100%{opacity:1;}
}

.badge{
    background:gold;
    color:black;
    padding:5px 10px;
    border-radius:5px;
    font-size:12px;
}

.footer{
    text-align:center;
    font-size:12px;
    opacity:0.6;
}
</style>
</head>
<body>

<div class="sidebar" id="sidebar">
<a href="#">🏠 Início</a>
<a href="#">📊 Mercado</a>
<a href="#">⭐ Premium</a>
<a href="#">⚙️ Configurações</a>
<a href="#">❓ Suporte</a>
</div>

<div class="overlay" id="overlay" onclick="toggleMenu()"></div>

<header>
<div class="menu-btn" onclick="toggleMenu()">☰</div>
🚀 NeuroQuant PRO – IA Avançada
</header>

<div class="container">

<div class="card">
<h3>Selecionar Criptomoeda</h3>
<select id="pairSelect"></select>
<button onclick="gerarSinal()">Analisar Mercado</button>
<div class="signal" id="resultado"></div>
</div>

<div class="card">
<h3>Área Premium <span class="badge">PRO</span></h3>
<a href="https://mpago.la/1DYvFBL" target="_blank">
<button>Assinar Agora – R$ 29,90</button>
</a>
</div>

<div class="footer">
NeuroQuant © 2026
</div>

</div>

<script>

function toggleMenu(){
    document.getElementById("sidebar").classList.toggle("active");
    document.getElementById("overlay").classList.toggle("active");
}

let intervaloAtualizacao;
let pares=[];

async function carregarPares(){
    let response=await fetch("https://api.binance.com/api/v3/exchangeInfo");
    let data=await response.json();

    pares=data.symbols
        .filter(s=>s.quoteAsset==="USDT" && s.status==="TRADING")
        .map(s=>s.symbol);

    let select=document.getElementById("pairSelect");

    pares.forEach(par=>{
        let option=document.createElement("option");
        option.value=par;
        option.textContent=par;
        select.appendChild(option);
    });
}

async function buscarDados(par){
    let req=await fetch(`https://api.binance.com/api/v3/klines?symbol=${par}&interval=15m&limit=100`);
    let data=await req.json();

    let closes=data.map(c=>parseFloat(c[4]));
    let volumes=data.map(c=>parseFloat(c[5]));

    return{
        preco:closes[closes.length-1],
        high:Math.max(...closes),
        low:Math.min(...closes),
        closes,
        volumes
    };
}

function calcularEMA(periodo,valores){
    let k=2/(periodo+1);
    let ema=valores[0];
    for(let i=1;i<valores.length;i++){
        ema=valores[i]*k+ema*(1-k);
    }
    return ema;
}

function calcularRSI(periodo,valores){
    let ganhos=0,perdas=0;
    for(let i=valores.length-periodo;i<valores.length-1;i++){
        let diff=valores[i+1]-valores[i];
        if(diff>0) ganhos+=diff;
        else perdas+=Math.abs(diff);
    }
    let rs=ganhos/perdas || 0;
    return 100-(100/(1+rs));
}

async function gerarSinal(){

    document.getElementById("resultado").innerHTML="<div class='loader'></div>";

    let par=document.getElementById("pairSelect").value;
    let dados=await buscarDados(par);

    let {preco,high,low,closes,volumes}=dados;

    let ema9=calcularEMA(9,closes);
    let ema21=calcularEMA(21,closes);
    let rsi=calcularRSI(14,closes);

    let volumeAtual=volumes[volumes.length-1];
    let volumeMedio=volumes.slice(-20).reduce((a,b)=>a+b)/20;

    let fib50=high-(high-low)*0.5;
    let fib618=high-(high-low)*0.618;

    let score=0;

    if(ema9>ema21) score++;
    if(rsi<35) score++;
    if(volumeAtual>volumeMedio) score++;

    if(ema9<ema21) score--;
    if(rsi>65) score--;
    if(volumeAtual>volumeMedio && ema9<ema21) score--;

    let tipo,prob;

    if(score>=2){tipo="COMPRA 📈";prob=88;}
    else if(score<=-2){tipo="VENDA 📉";prob=88;}
    else{tipo="NEUTRO ⚖️";prob=65;}

    atualizarTela(par,preco,high,low,tipo,prob,fib50,fib618,ema9,ema21,rsi);

    clearInterval(intervaloAtualizacao);
    intervaloAtualizacao=setInterval(()=>gerarSinal(),10000);
}

function atualizarTela(par,preco,high,low,tipo,prob,fib50,fib618,ema9,ema21,rsi){

    document.getElementById("resultado").innerHTML=`
    Par: ${par}<br><br>

    💰 Preço Atual: <span style="color:#00f5ff">${preco.toFixed(2)}</span><br>
    📊 High: ${high.toFixed(2)}<br>
    📊 Low: ${low.toFixed(2)}<br><br>

    🤖 <b>Sinal IA:</b> ${tipo}<br>
    🎯 <b>Probabilidade:</b> ${prob}%<br><br>

    📈 EMA 9: ${ema9.toFixed(2)}<br>
    📉 EMA 21: ${ema21.toFixed(2)}<br>
    📊 RSI 14: ${rsi.toFixed(2)}<br><br>

    📐 Fibonacci:<br>
    0.5 → ${fib50.toFixed(2)}<br>
    0.618 → ${fib618.toFixed(2)}<br><br>

    🔄 Atualizando automaticamente...
    `;
}

carregarPares();

</script>

</body>
</html>
