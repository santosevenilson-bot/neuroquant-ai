<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NeuroQuant PRO</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family: 'Segoe UI', sans-serif;
}

body{
    background: linear-gradient(135deg,#0f172a,#020617);
    color:white;
    display:flex;
}

/* SIDEBAR */
.sidebar{
    width:220px;
    background:#0b1220;
    height:100vh;
    padding:20px;
    border-right:1px solid #1e293b;
}

.sidebar h2{
    color:#00f5c3;
    margin-bottom:30px;
}

.sidebar button{
    width:100%;
    margin-bottom:10px;
    padding:10px;
    background:#111827;
    border:none;
    color:white;
    border-radius:8px;
    cursor:pointer;
}

.sidebar button:hover{
    background:#00f5c3;
    color:black;
}

/* MAIN */
.main{
    flex:1;
    padding:30px;
}

.header{
    font-size:24px;
    margin-bottom:20px;
}

/* CARDS */
.card{
    background: rgba(255,255,255,0.05);
    backdrop-filter: blur(12px);
    border:1px solid rgba(255,255,255,0.1);
    padding:20px;
    border-radius:15px;
    margin-bottom:20px;
}

.grid{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
    gap:20px;
}

select,input{
    width:100%;
    padding:10px;
    margin-top:10px;
    border-radius:8px;
    border:none;
}

button.analisar{
    margin-top:10px;
    width:100%;
    padding:12px;
    background:#00f5c3;
    border:none;
    border-radius:10px;
    font-weight:bold;
    cursor:pointer;
}

.indicador{
    font-size:18px;
    margin:10px 0;
}

.tendencia-alta{ color:#00ff88; font-weight:bold;}
.tendencia-baixa{ color:#ff4d4d; font-weight:bold;}
.tendencia-neutro{ color:#ffd000; font-weight:bold;}

canvas{
    background:white;
    border-radius:15px;
}
</style>
</head>
<body>

<div class="sidebar">
    <h2>NeuroQuant</h2>
    <button>Dashboard</button>
    <button>Mercado</button>
    <button>Plano PRO</button>
</div>

<div class="main">

<div class="header">
📊 Análise Inteligente de Criptomoedas
</div>

<div class="card">
<h3>Selecionar Par</h3>
<select id="binancePairs"></select>
<input type="text" id="customPair" placeholder="Ou digite outro par (ex: XRPUSDT)">
<button class="analisar" onclick="analisar()">Analisar Agora</button>
</div>

<div class="grid">
    <div class="card">
        <h3>Indicadores</h3>
        <div id="indicadores"></div>
    </div>

    <div class="card">
        <h3>Fibonacci</h3>
        <div id="fibo"></div>
    </div>
</div>

<div class="card">
<h3>Gráfico</h3>
<canvas id="grafico"></canvas>
</div>

</div>

<script>

// carregar pares
fetch('https://api.binance.com/api/v3/exchangeInfo')
.then(res=>res.json())
.then(data=>{
    let select=document.getElementById("binancePairs");
    data.symbols.forEach(s=>{
        if(s.status==="TRADING"){
            let opt=document.createElement("option");
            opt.value=s.symbol;
            opt.text=s.symbol;
            select.add(opt);
        }
    });
});

function calcularEMA(periodo,dados){
    let k=2/(periodo+1);
    let ema=[dados[0]];
    for(let i=1;i<dados.length;i++){
        ema.push(dados[i]*k+ema[i-1]*(1-k));
    }
    return ema;
}

function calcularRSI(periodo,dados){
    let ganhos=0,perdas=0;
    for(let i=1;i<=periodo;i++){
        let diff=dados[i]-dados[i-1];
        if(diff>=0) ganhos+=diff;
        else perdas+=Math.abs(diff);
    }
    let rs=ganhos/perdas;
    return 100-(100/(1+rs));
}

async function analisar(){

let select=document.getElementById("binancePairs").value;
let custom=document.getElementById("customPair").value;
let par=custom!==""?custom.toUpperCase():select;

let url=`https://api.binance.com/api/v3/klines?symbol=${par}&interval=1h&limit=100`;
let response=await fetch(url);
let data=await response.json();

let closes=data.map(c=>parseFloat(c[4]));
let highs=data.map(c=>parseFloat(c[2]));
let lows=data.map(c=>parseFloat(c[3]));

let ema9=calcularEMA(9,closes);
let ema21=calcularEMA(21,closes);
let rsi=calcularRSI(14,closes);

let tendencia="Neutro";
let classe="tendencia-neutro";

if(ema9.at(-1)>ema21.at(-1)&&rsi>55){
    tendencia="Alta 🚀";
    classe="tendencia-alta";
}
else if(ema9.at(-1)<ema21.at(-1)&&rsi<45){
    tendencia="Baixa 📉";
    classe="tendencia-baixa";
}

let max=Math.max(...highs);
let min=Math.min(...lows);

let fib50=(min+(max-min)*0.5).toFixed(2);
let fib618=(min+(max-min)*0.618).toFixed(2);

document.getElementById("indicadores").innerHTML=`
<div class="indicador">EMA 9: ${ema9.at(-1).toFixed(2)}</div>
<div class="indicador">EMA 21: ${ema21.at(-1).toFixed(2)}</div>
<div class="indicador">RSI: ${rsi.toFixed(2)}</div>
<div class="indicador ${classe}">Tendência: ${tendencia}</div>
`;

document.getElementById("fibo").innerHTML=`
<div class="indicador">50%: ${fib50}</div>
<div class="indicador">61.8%: ${fib618}</div>
`;

new Chart(document.getElementById("grafico"),{
type:'line',
data:{
labels:closes.map((_,i)=>i),
datasets:[{label:'Preço',data:closes}]
}
});

}

</script>

</body>
</html>
