<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>IA Crypto Pro</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Poppins',sans-serif;}

body{
background:linear-gradient(135deg,#0f2027,#203a43,#2c5364);
color:white;
min-height:100vh;
overflow-x:hidden;
}

/* MENU */
.menu-btn{
position:fixed;
top:20px;
left:20px;
font-size:28px;
cursor:pointer;
z-index:1001;
transition:0.3s;
}

.sidebar{
position:fixed;
left:-260px;
top:0;
width:250px;
height:100%;
background:#111;
padding:25px;
transition:0.4s ease;
z-index:1000;
box-shadow:4px 0 15px rgba(0,0,0,0.5);
}

.sidebar.active{ left:0; }

.overlay{
position:fixed;
top:0;left:0;
width:100%;height:100%;
background:rgba(0,0,0,0.5);
display:none;
z-index:999;
}

.overlay.active{ display:block; }

.sidebar h2{
margin-bottom:25px;
font-size:20px;
text-align:center;
}

.sidebar a{
display:flex;
align-items:center;
gap:10px;
color:white;
text-decoration:none;
margin:15px 0;
padding:10px;
border-radius:8px;
transition:0.3s;
}

.sidebar a:hover{
background:#1f3c88;
}

/* CONTEÚDO */
.container{
padding:80px 20px 30px 20px;
text-align:center;
animation:fadeIn 0.8s ease;
}

@keyframes fadeIn{
from{opacity:0; transform:translateY(15px);}
to{opacity:1; transform:translateY(0);}
}

.card{
background:rgba(255,255,255,0.05);
backdrop-filter:blur(12px);
border-radius:20px;
padding:25px;
margin-top:20px;
box-shadow:0 8px 20px rgba(0,0,0,0.4);
}

select{
width:100%;
padding:12px;
border-radius:10px;
margin-top:15px;
border:none;
}

button{
margin-top:15px;
padding:12px;
width:100%;
border:none;
border-radius:10px;
background:linear-gradient(90deg,#00c6ff,#0072ff);
color:white;
font-weight:600;
cursor:pointer;
transition:0.3s;
}

button:hover{ transform:scale(1.05); }

.premium{
margin-top:25px;
background:linear-gradient(135deg,#1f4037,#99f2c8);
padding:20px;
border-radius:15px;
color:#000;
font-weight:600;
}

canvas{
margin-top:20px;
background:white;
border-radius:15px;
padding:10px;
}
</style>
</head>

<body>

<div class="menu-btn" onclick="toggleMenu()">☰</div>

<div class="sidebar" id="sidebar">
<h2>🤖 IA Crypto</h2>
<a href="#" onclick="openScreen('home')">🏠 Home</a>
<a href="#" onclick="scanMarket()">📡 Varredura</a>
<a href="#" onclick="alert('Premium ativo após pagamento.')">💎 Premium</a>
<a href="#" onclick="alert('Sistema de análise inteligente com indicadores técnicos.')">🧠 Sobre</a>
</div>

<div class="overlay" id="overlay" onclick="toggleMenu()"></div>

<div class="container">

<h1>IA Crypto Pro</h1>
<p>Análise Inteligente em Tempo Real</p>

<div class="card">

<select id="symbol">
<option value="BTCUSDT">BTC/USDT</option>
<option value="ETHUSDT">ETH/USDT</option>
<option value="SOLUSDT">SOL/USDT</option>
<option value="BNBUSDT">BNB/USDT</option>
<option value="XRPUSDT">XRP/USDT</option>
<option value="ADAUSDT">ADA/USDT</option>
<option value="DOGEUSDT">DOGE/USDT</option>
</select>

<button onclick="loadData()">Buscar Análise</button>

<h3 id="price"></h3>
<h3 id="signal"></h3>
<h4 id="fibo"></h4>

<canvas id="chart"></canvas>
</div>

<div class="premium">
Plano Premium R$ 29,90<br><br>
<a href="https://mpago.la/1DYvFBL" target="_blank">
<button>Ativar Premium</button>
</a>
</div>

</div>

<script>
let chart;

function toggleMenu(){
document.getElementById("sidebar").classList.toggle("active");
document.getElementById("overlay").classList.toggle("active");
}

function openScreen(screen){
toggleMenu();
if(screen==="home"){ location.reload(); }
}

async function loadData(){
let symbol=document.getElementById("symbol").value;

let url=`https://api.binance.com/api/v3/klines?symbol=${symbol}&interval=1m&limit=100`;
let response=await fetch(url);
let data=await response.json();

let prices=data.map(d=>parseFloat(d[4]));
let lastPrice=prices[prices.length-1];

document.getElementById("price").innerText="Preço Atual: "+lastPrice.toFixed(4);

// SINAL IA (SMA 50)
let sma=prices.slice(-50).reduce((a,b)=>a+b)/50;
let signal= lastPrice>sma ? "🟢 Sinal: Compra" : "🔴 Sinal: Venda";
document.getElementById("signal").innerText=signal;

// FIBONACCI
let high=Math.max(...prices);
let low=Math.min(...prices);
let fib50=high-(high-low)*0.5;
let fib618=high-(high-low)*0.618;

document.getElementById("fibo").innerText=
"Fibo 50%: "+fib50.toFixed(4)+" | Fibo 61.8%: "+fib618.toFixed(4);

// GRÁFICO
if(chart) chart.destroy();

let ctx=document.getElementById("chart");

chart=new Chart(ctx,{
type:"line",
data:{
labels:prices.map((_,i)=>i),
datasets:[
{
label:symbol,
data:prices,
borderColor:"#0072ff",
fill:false
}
]
}
});
}

// VARREDURA
async function scanMarket(){
let pairs=["BTCUSDT","ETHUSDT","SOLUSDT","BNBUSDT","XRPUSDT","ADAUSDT","DOGEUSDT"];

for(let pair of pairs){
let url=`https://api.binance.com/api/v3/klines?symbol=${pair}&interval=1m&limit=50`;
let response=await fetch(url);
let data=await response.json();

let prices=data.map(d=>parseFloat(d[4]));
let last=prices[prices.length-1];
let sma=prices.slice(-20).reduce((a,b)=>a+b)/20;

if(last>sma){
alert("🟢 Compra detectada em "+pair);
}
}
}

// Atualização automática a cada 10 segundos
setInterval(()=>{
loadData();
},10000);

</script>

</body>
</html>
