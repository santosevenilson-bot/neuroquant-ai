<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NeuroQuant Pro</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600&display=swap" rel="stylesheet">

<style>
body{
    margin:0;
    background:#0f0f1a;
    font-family:'Orbitron',sans-serif;
    color:white;
}

header{
    background:linear-gradient(90deg,#00f5ff,#0066ff);
    padding:15px;
    text-align:center;
    font-size:20px;
    font-weight:600;
}

.container{
    max-width:500px;
    margin:auto;
    padding:20px;
}

.card{
    background:#1a1a2e;
    padding:20px;
    border-radius:15px;
    box-shadow:0 0 20px rgba(0,255,255,0.2);
    margin-bottom:20px;
}

input{
    width:100%;
    padding:12px;
    border-radius:8px;
    border:none;
    margin-bottom:15px;
    font-size:14px;
}

button{
    width:100%;
    padding:12px;
    border:none;
    border-radius:8px;
    background:linear-gradient(90deg,#00f5ff,#0066ff);
    color:white;
    font-weight:bold;
    cursor:pointer;
    transition:0.3s;
}

button:hover{
    opacity:0.8;
}

.signal{
    text-align:center;
    font-size:16px;
    margin-top:10px;
}

.premium-lock{
    text-align:center;
    opacity:0.6;
}

.badge{
    background:gold;
    color:black;
    padding:5px 10px;
    border-radius:5px;
    font-size:12px;
}

.footer{
    text-align:center;
    font-size:12px;
    opacity:0.6;
    margin-top:20px;
}
</style>
</head>
<body>

<header>
🚀 NeuroQuant PRO – Sinais Inteligentes
</header>

<div class="container">

<div class="card">
<h3>Análise de Criptomoeda</h3>
<input type="text" id="pair" placeholder="Digite o par (Ex: BTC/USDT)">
<button onclick="gerarSinal()">Gerar Sinal</button>

<div class="signal" id="resultado"></div>
</div>

<div class="card">
<h3>Área Premium <span class="badge">PRO</span></h3>
<div class="premium-lock">
🔒 Sinais com maior probabilidade<br>
🔒 Cálculo técnico com Fibonacci<br>
🔒 Alvos e Stops sugeridos<br><br>

<a href="https://mpago.la/1DYvFBL" target="_blank">
<button>Assinar Agora – R$ 29,90</button>
</a>
</div>
</div>

<div class="footer">
NeuroQuant © 2026
</div>

</div>

<script>
function gerarSinal(){
    let pair = document.getElementById("pair").value;
    if(pair==""){
        alert("Digite o par!");
        return;
    }

    // Preço base simulado
    let precoAtual = Math.floor(Math.random()*50000)+20000;

    // Simulação de movimento recente
    let movimento = Math.random();

    let tendencia;
    let tipo;
    let prob;
    let topo;
    let fundo;

    if(movimento > 0.6){
        tendencia = "📈 Tendência de Alta";
        tipo = "COMPRA";
        prob = Math.floor(Math.random()*10)+78;

        fundo = precoAtual - Math.floor(Math.random()*1500);
        topo = precoAtual + Math.floor(Math.random()*2500);

    } else if(movimento < 0.4){
        tendencia = "📉 Tendência de Baixa";
        tipo = "VENDA";
        prob = Math.floor(Math.random()*10)+78;

        topo = precoAtual + Math.floor(Math.random()*1500);
        fundo = precoAtual - Math.floor(Math.random()*2500);

    } else {
        tendencia = "⚖️ Consolidação";
        tipo = "NEUTRO";
        prob = Math.floor(Math.random()*10)+55;

        topo = precoAtual + Math.floor(Math.random()*1000);
        fundo = precoAtual - Math.floor(Math.random()*1000);
    }

    // Fibonacci baseado no swing
    let fib236 = (topo - (topo - fundo) * 0.236).toFixed(2);
    let fib382 = (topo - (topo - fundo) * 0.382).toFixed(2);
    let fib50  = (topo - (topo - fundo) * 0.5).toFixed(2);
    let fib618 = (topo - (topo - fundo) * 0.618).toFixed(2);

    let alvo, stop;

    if(tipo === "COMPRA"){
        alvo = topo.toFixed(2);
        stop = fib618;
    }
    else if(tipo === "VENDA"){
        alvo = fundo.toFixed(2);
        stop = fib382;
    }
    else{
        alvo = fib50;
        stop = fib50;
    }

    document.getElementById("resultado").innerHTML=
    `
    Par: ${pair.toUpperCase()}<br><br>

    Preço Atual: ${precoAtual}<br>
    ${tendencia}<br><br>

    🔥 <b>Sinal:</b> ${tipo}<br>
    🎯 <b>Probabilidade:</b> ${prob}%<br><br>

    🎯 <b>Alvo Técnico:</b> ${alvo}<br>
    🛑 <b>Stop Técnico:</b> ${stop}<br><br>

    📊 <b>Níveis Fibonacci:</b><br>
    0.236 → ${fib236}<br>
    0.382 → ${fib382}<br>
    0.5 → ${fib50}<br>
    0.618 → ${fib618}
    `;
}
</script>

</body>
</html>
