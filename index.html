<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NeuroQuant Signals PRO</title>
<style>
body{
    background:#0f172a;
    color:white;
    font-family:Arial;
    padding:20px;
}
h1{
    text-align:center;
    color:#00ffcc;
}
select{
    padding:10px;
    margin-bottom:20px;
    width:100%;
    font-size:16px;
}
.card{
    background:#1e293b;
    padding:20px;
    border-radius:10px;
    margin-top:10px;
}
.buy{color:#00ff88;font-weight:bold;}
.sell{color:#ff4d4d;font-weight:bold;}
.neutral{color:#ffaa00;font-weight:bold;}
.prob{
    font-size:20px;
    margin-top:10px;
}
</style>
</head>
<body>

<h1>NeuroQuant AI - Sinais Binance</h1>

<select id="pairSelect"></select>

<div class="card">
    <p>Preço Atual: <span id="price">--</span></p>
    <p>Tendência: <span id="trend">--</span></p>
    <p>Sinal: <span id="signal">--</span></p>
    <p class="prob">Probabilidade: <span id="prob">--</span></p>
</div>

<script>

const pairSelect = document.getElementById("pairSelect");

async function loadPairs(){
    const res = await fetch("https://api.binance.com/api/v3/exchangeInfo");
    const data = await res.json();
    
    const usdtPairs = data.symbols
        .filter(s => s.quoteAsset === "USDT" && s.status === "TRADING")
        .map(s => s.symbol);

    usdtPairs.forEach(pair=>{
        const option = document.createElement("option");
        option.value = pair;
        option.textContent = pair;
        pairSelect.appendChild(option);
    });

    analyze();
}

async function analyze(){
    const pair = pairSelect.value;
    if(!pair) return;

    const res = await fetch(`https://api.binance.com/api/v3/klines?symbol=${pair}&interval=15m&limit=100`);
    const data = await res.json();

    const closes = data.map(c => parseFloat(c[4]));

    const price = closes[closes.length-1];
    document.getElementById("price").innerText = price.toFixed(4);

    const ema9 = calculateEMA(closes,9);
    const ema21 = calculateEMA(closes,21);
    const rsi = calculateRSI(closes,14);

    let trend, signal, prob;

    if(ema9 > ema21 && rsi > 55){
        trend="Alta";
        signal="COMPRA";
        prob="75%";
    }
    else if(ema9 < ema21 && rsi < 45){
        trend="Baixa";
        signal="VENDA";
        prob="75%";
    }
    else{
        trend="Neutro";
        signal="AGUARDE";
        prob="50%";
    }

    document.getElementById("trend").innerText = trend;
    document.getElementById("signal").innerHTML =
        signal==="COMPRA" ? `<span class="buy">${signal}</span>` :
        signal==="VENDA" ? `<span class="sell">${signal}</span>` :
        `<span class="neutral">${signal}</span>`;

    document.getElementById("prob").innerText = prob;
}

function calculateEMA(data, period){
    const k = 2/(period+1);
    let ema = data[0];
    for(let i=1;i<data.length;i++){
        ema = data[i]*k + ema*(1-k);
    }
    return ema;
}

function calculateRSI(data, period){
    let gains=0, losses=0;
    for(let i=data.length-period;i<data.length-1;i++){
        const diff = data[i+1]-data[i];
        if(diff>=0) gains+=diff;
        else losses-=diff;
    }
    const rs = gains/losses;
    return 100 - (100/(1+rs));
}

pairSelect.addEventListener("change", analyze);
setInterval(analyze,30000);

loadPairs();

</script>

</body>
</html>
