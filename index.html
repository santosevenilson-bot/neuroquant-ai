<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NeuroQuant IA</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600&display=swap" rel="stylesheet">

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Orbitron', sans-serif;
}

body{
background:linear-gradient(135deg,#0f2027,#203a43,#2c5364);
color:white;
overflow-x:hidden;
}

/* MENU */
.sidebar{
position:fixed;
left:-250px;
top:0;
width:250px;
height:100%;
background:#111;
padding-top:60px;
transition:0.4s ease;
box-shadow:5px 0 15px rgba(0,0,0,0.5);
z-index:1000;
}

.sidebar a{
display:block;
padding:15px 25px;
color:#00f7ff;
text-decoration:none;
transition:0.3s;
}

.sidebar a:hover{
background:#00f7ff;
color:#111;
}

.sidebar.active{
left:0;
}

.menu-btn{
position:fixed;
top:20px;
left:20px;
font-size:28px;
cursor:pointer;
z-index:1100;
}

/* CONTEÚDO */
.container{
padding:100px 30px;
text-align:center;
}

.card{
background:rgba(255,255,255,0.05);
backdrop-filter:blur(10px);
padding:30px;
border-radius:15px;
margin:20px auto;
max-width:400px;
box-shadow:0 0 20px rgba(0,247,255,0.3);
transition:0.4s;
}

.card:hover{
transform:translateY(-10px);
box-shadow:0 0 35px rgba(0,247,255,0.6);
}

button{
background:#00f7ff;
border:none;
padding:12px 25px;
color:#111;
font-weight:bold;
border-radius:30px;
cursor:pointer;
transition:0.3s;
}

button:hover{
background:#fff;
transform:scale(1.05);
}

/* ANIMAÇÃO SUAVE */
.fade-in{
opacity:0;
transform:translateY(20px);
animation:fadeUp 1s forwards;
}

@keyframes fadeUp{
to{
opacity:1;
transform:translateY(0);
}
}

footer{
margin-top:50px;
font-size:12px;
opacity:0.6;
}
</style>
</head>

<body>

<div class="menu-btn" onclick="toggleMenu()">☰</div>

<div class="sidebar" id="sidebar">
<a href="#">Dashboard</a>
<a href="#">Análise IA</a>
<a href="#">Sinais em Tempo Real</a>
<a href="#">Configurações</a>
</div>

<div class="container fade-in">
<h1>NeuroQuant IA</h1>
<p>Previsão Avançada com Inteligência Artificial</p>

<div class="card">
<h2>Plano Premium</h2>
<p>Acesso completo aos sinais avançados</p>
<h3>R$ 29,90</h3>
<br>
<a href="https://mpago.la/1DYvFBL" target="_blank">
<button>Assinar Agora</button>
</a>
</div>

<footer>
© 2026 NeuroQuant IA - Todos os direitos reservados
</footer>

</div>

<script>
function toggleMenu(){
document.getElementById("sidebar").classList.toggle("active");
}
</script>

</body>
</html>
