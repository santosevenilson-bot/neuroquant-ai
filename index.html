<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NeuroQuant IA v2.0</title>

<script src="https://s3.tradingview.com/tv.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Orbitron',sans-serif;}
body{background:#0e1117;color:white;overflow:hidden;}

header{
height:60px;
background:#161b22;
display:flex;
align-items:center;
justify-content:space-between;
padding:0 20px;
border-bottom:1px solid #222;
}

.logo{font-weight:600;font-size:18px;color:#00f7ff;}
.market-status{font-size:14px;}

.container{
display:grid;
grid-template-columns: 220px 1fr 350px;
height:calc(100vh - 60px);
}

.sidebar{
background:#111827;
padding:20px;
border-right:1px solid #222;
}

.sidebar button{
width:100%;
margin-bottom:10px;
padding:10px;
border:none;
background:#00f7ff;
border-radius:8px;
cursor:pointer;
font-weight:bold;
}

.main{
padding:15px;
overflow:auto;
}

.signal-panel{
background:#111827;
padding:20px;
border-left:1px solid #222;
overflow:auto;
}

.card{
background:#161b22;
padding:15px;
margin-bottom:15px;
border-radius:10px;
}

input,select{
padding:8px;
border:none;
border-radius:6px;
margin:5px;
}

button.generate{
background:#00f7ff;
padding:10px 20px;
border:none;
border-radius:20px;
cursor:pointer;
font-weight:bold;
}

.buy{color:#00ff88;}
.sell{color:#ff4d4d;}
.neutral{color:#ffc107;}

.history-item{
font-size:12px;
margin-bottom:5px;
border-bottom:1px solid #222;
padding-bottom:5px;
}
</style>
</head>

<body>

<header>
<div class="logo">NeuroQuant IA</div>
<div class="market-status" id="marketStatus">Status: --</div>
</header>

<div class="container">

<div class="sidebar">
<button onclick="loadChart()">Atualizar Gráfico</button>
<button onclick="generateSignal()">Gerar Sinal</button>
</div>

<div class="main">
<div class="card">
<input type="text" id="pair" placeholder="Ex: BTCUSDT">
<select id="timeframe">
<option value="5">5m</option>
<option value="15">15m</option>
<option value="60">1h</option>
<option value="240">4h</option>
</select>
</div>

<div class="card">
<div id="chart"></div>
</div>
</div>

<div class="signal-panel">
<div class="card">
<h3>Sinal Atual</h3>
<div id="signalBox">Aguardando...</div>
</div>

<div class="card">
<h3>Histórico</h3>
<div id="history"></div>
</div>
</div>

</div>

<script>

let historyList=[];

function loadChart(){
let pair=document.getElementById("pair").value.toUpperCase();
let tf=document.getElementById("timeframe").value;

if(pair===""){alert("Digite um par");return;}

document.getElementById("chart").innerHTML="";

new TradingView.widget({
width:"100%",
height:500,
symbol:"BINANCE:"+pair,
interval:tf,
theme:"dark",
container_id:"chart"
});
}

function generateSignal(){

let market=Math.random();
let status,signal,prob,className;

if(market>0.6){
status="Mercado em Alta";
signal="COMPRA";
prob=Math.floor(70+Math.random()*15);
className="buy";
}else if(market<0.4){
status="Mercado em Baixa";
signal="VENDA";
prob=Math.floor(70+Math.random()*15);
className="sell";
}else{
status="Mercado Lateral";
signal="NEUTRO";
prob=Math.floor(50+Math.random()*10);
className="neutral";
}

document.getElementById("marketStatus").innerText="Status: "+status;

document.getElementById("signalBox").innerHTML=
"<h2 class='"+className+"'>"+signal+"</h2><p>Probabilidade: "+prob+"%</p>";

let time=new Date().toLocaleTimeString();
historyList.unshift(signal+" - "+prob+"% ("+time+")");

updateHistory();
}

function updateHistory(){
let historyDiv=document.getElementById("history");
historyDiv.innerHTML="";
historyList.slice(0,8).forEach(item=>{
historyDiv.innerHTML+="<div class='history-item'>"+item+"</div>";
});
}

</script>

</body>
</html>
