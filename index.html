<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NeuroQuant AI | Sinal Automático</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600;800&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Orbitron',sans-serif;}
body{background:#0c111d;color:#fff;text-align:center;}
section{padding:60px 20px;}
.panel{
background:#1a2235;
padding:25px;
border-radius:15px;
margin:20px auto;
max-width:700px;
}
select,input{
padding:10px;
margin:10px 0;
border-radius:8px;
border:none;
width:100%;
}
.price{font-size:28px;color:#00ff88;margin:15px 0;}
.signal{font-size:32px;margin-top:20px;font-weight:bold;}
.alta{color:#00ff88;}
.baixa{color:#ff3b3b;}
.neutro{color:#ffd000;}
small{color:#aaa;}
</style>
</head>

<body>

<section>
<h1>NeuroQuant AI</h1>
<p>Preço ao vivo + Geração automática de sinal</p>
</section>

<section class="panel">
<h3>Selecionar Par</h3>

<select id="parSelect">
<option value="BTCUSDT">BTC/USDT</option>
<option value="ETHUSDT">ETH/USDT</option>
<option value="BNBUSDT">BNB/USDT</option>
<option value="SOLUSDT">SOL/USDT</option>
<option value="XRPUSDT">XRP/USDT</option>
<option value="ADAUSDT">ADA/USDT</option>
<option value="DOGEUSDT">DOGE/USDT</option>
</select>

<input type="text" id="parManual" placeholder="Digite qualquer par ex: RIVERUSDT">
<button onclick="usarParManual()">Usar Par Digitado</button>

<div class="price">
Preço Atual: $ <span id="preco">Carregando...</span>
</div>

<div>
Variação: <span id="variacao">0%</span>
</div>

<div id="sinal" class="signal neutro">
NEUTRO
</div>

<p><small>Atualiza automaticamente a cada 5 segundos</small></p>

</section>

<script>

let parAtual = "BTCUSDT";
let precoAnterior = null;

document.getElementById("parSelect").addEventListener("change", function(){
parAtual = this.value;
precoAnterior = null;
buscarPreco();
});

function usarParManual(){
let par = document.getElementById("parManual").value.toUpperCase();
if(par !== ""){
parAtual = par;
precoAnterior = null;
buscarPreco();
}
}

async function buscarPreco(){
try{
let response = await fetch(`https://api.binance.com/api/v3/ticker/price?symbol=${parAtual}`);
let data = await response.json();

let precoAtual = parseFloat(data.price);
document.getElementById("preco").innerText = precoAtual.toFixed(4);

if(precoAnterior !== null){
let variacao = ((precoAtual - precoAnterior) / precoAnterior) * 100;
document.getElementById("variacao").innerText = variacao.toFixed(3) + "%";
gerarSinal(variacao);
}

precoAnterior = precoAtual;

}catch{
document.getElementById("preco").innerText = "Par inválido";
}
}

function gerarSinal(variacao){
let sinal = document.getElementById("sinal");

if(variacao > 0.15){
sinal.innerText = "ALTA";
sinal.className = "signal alta";
}
else if(variacao < -0.15){
sinal.innerText = "BAIXA";
sinal.className = "signal baixa";
}
else{
sinal.innerText = "NEUTRO";
sinal.className = "signal neutro";
}
}

setInterval(buscarPreco, 5000);
buscarPreco();

</script>

</body>
</html>
