<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>IA Crypto Pro</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Poppins',sans-serif;}

body{
background:linear-gradient(135deg,#0f2027,#203a43,#2c5364);
color:white;
min-height:100vh;
overflow-x:hidden;
}

/* MENU */
.menu-btn{
position:fixed;
top:20px;
left:20px;
font-size:28px;
cursor:pointer;
z-index:1001;
transition:0.3s;
}

.sidebar{
position:fixed;
left:-260px;
top:0;
width:250px;
height:100%;
background:#111;
padding:25px;
transition:0.4s ease;
z-index:1000;
box-shadow:4px 0 15px rgba(0,0,0,0.5);
}

.sidebar.active{ left:0; }

.overlay{
position:fixed;
top:0;left:0;
width:100%;height:100%;
background:rgba(0,0,0,0.5);
display:none;
z-index:999;
}

.overlay.active{ display:block; }

.sidebar h2{
margin-bottom:25px;
font-size:20px;
text-align:center;
}

.sidebar a{
display:flex;
align-items:center;
gap:10px;
color:white;
text-decoration:none;
margin:15px 0;
padding:10px;
border-radius:8px;
transition:0.3s;
}

.sidebar a:hover{
background:#1f3c88;
}

/* CONTEÚDO */
.container{
padding:80px 20px 30px 20px;
text-align:center;
animation:fadeIn 1s ease;
}

@keyframes fadeIn{
from{opacity:0; transform:translateY(20px);}
to{opacity:1; transform:translateY(0);}
}

.card{
background:rgba(255,255,255,0.05);
backdrop-filter:blur(12px);
border-radius:20px;
padding:25px;
margin-top:20px;
box-shadow:0 8px 20px rgba(0,0,0,0.4);
}

input{
width:100%;
padding:12px;
border-radius:10px;
border:none;
margin-top:15px;
}

button{
margin-top:15px;
padding:12px;
width:100%;
border:none;
border-radius:10px;
background:linear-gradient(90deg,#00c6ff,#0072ff);
color:white;
font-weight:600;
cursor:pointer;
transition:0.3s;
}

button:hover{
transform:scale(1.05);
}

.premium{
margin-top:25px;
background:linear-gradient(135deg,#1f4037,#99f2c8);
padding:20px;
border-radius:15px;
color:#000;
font-weight:600;
}

canvas{
margin-top:20px;
background:white;
border-radius:15px;
padding:10px;
}
</style>
</head>

<body>

<!-- BOTÃO MENU -->
<div class="menu-btn" onclick="toggleMenu()">☰</div>

<!-- MENU LATERAL -->
<div class="sidebar" id="sidebar">
<h2>🤖 IA Crypto</h2>

<a href="#" onclick="openScreen('home')">🏠 Home</a>
<a href="#" onclick="openScreen('sinais')">📡 Sinais IA</a>
<a href="#" onclick="openScreen('fibo')">📊 Fibonacci</a>
<a href="#" onclick="openScreen('premium')">💎 Premium</a>
<a href="#" onclick="openScreen('sobre')">🧠 Sobre IA</a>
</div>

<div class="overlay" id="overlay" onclick="toggleMenu()"></div>

<div class="container" id="content">

<h1>IA Crypto Pro</h1>
<p>Análise Inteligente em Tempo Real</p>

<div class="card">
<input type="text" id="symbol" placeholder="Digite o par (Ex: BTCUSDT)">
<button onclick="loadData()">Buscar Análise</button>

<h3 id="price"></h3>
<h3 id="signal"></h3>

<canvas id="chart"></canvas>
</div>

<div class="premium">
Plano Premium R$ 29,90<br><br>
<a href="https://mpago.la/1DYvFBL" target="_blank">
<button>Ativar Premium</button>
</a>
</div>

</div>

<script>
let chart;

function toggleMenu(){
document.getElementById("sidebar").classList.toggle("active");
document.getElementById("overlay").classList.toggle("active");
}

function openScreen(screen){
toggleMenu();
if(screen==="home"){
location.reload();
}
if(screen==="premium"){
alert("Plano Premium R$29,90\nAcesso a sinais avançados e IA preditiva.");
}
if(screen==="sobre"){
alert("Sistema com análise automatizada baseada em indicadores técnicos e inteligência artificial.");
}
}

async function loadData(){
let symbol=document.getElementById("symbol").value.toUpperCase();
if(!symbol) return alert("Digite um par válido");

let url=`https://api.binance.com/api/v3/klines?symbol=${symbol}&interval=1m&limit=50`;
let response=await fetch(url);
let data=await response.json();

let prices=data.map(d=>parseFloat(d[4]));
let lastPrice=prices[prices.length-1];

document.getElementById("price").innerText="Preço Atual: "+lastPrice;

let sma=prices.reduce((a,b)=>a+b)/prices.length;
let signal= lastPrice>sma ? "🟢 Sinal: Compra" : "🔴 Sinal: Venda";

document.getElementById("signal").innerText=signal;

if(chart) chart.destroy();

let ctx=document.getElementById("chart");
chart=new Chart(ctx,{
type:"line",
data:{
labels:prices.map((_,i)=>i),
datasets:[{
label:symbol,
data:prices,
borderColor:"#0072ff",
fill:false
}]
}
});
}
</script>

</body>
</html>
