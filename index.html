<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NeuroQuant IA</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600&display=swap" rel="stylesheet">

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Orbitron', sans-serif;
}

body{
height:100vh;
background:linear-gradient(135deg,#03121a,#0b3a40,#0a1f26);
display:flex;
flex-direction:column;
justify-content:space-between;
color:#e6fefe;
}

/* TOPO */
.top{
padding:20px;
}

.menu{
font-size:28px;
cursor:pointer;
}

/* CENTRO */
.center{
flex:1;
display:flex;
flex-direction:column;
align-items:center;
justify-content:center;
text-align:center;
padding:20px;
}

.title{
font-size:32px;
margin-bottom:10px;
letter-spacing:2px;
}

.subtitle{
font-size:16px;
opacity:0.8;
margin-bottom:40px;
}

/* CARD */
.card{
width:100%;
max-width:380px;
background:rgba(255,255,255,0.05);
backdrop-filter:blur(20px);
border-radius:25px;
padding:30px;
box-shadow:0 0 40px rgba(0,255,200,0.2);
}

.card h2{
font-size:22px;
margin-bottom:15px;
}

.price{
font-size:28px;
margin:15px 0;
color:#00ffff;
}

.button{
margin-top:20px;
padding:15px;
border:none;
border-radius:50px;
width:100%;
font-size:18px;
background:linear-gradient(90deg,#00f5ff,#00ffcc);
color:#003b40;
cursor:pointer;
transition:0.3s;
}

.button:hover{
transform:scale(1.05);
box-shadow:0 0 20px #00ffff;
}

/* RODAPÉ */
.footer{
text-align:center;
font-size:12px;
opacity:0.6;
padding:20px;
}
</style>
</head>
<body>

<div class="top">
<div class="menu">☰</div>
</div>

<div class="center">
<div class="title">NeuroQuant IA</div>
<div class="subtitle">
Previsão Avançada com Inteligência Artificial
</div>

<div class="card">
<h2>Plano Premium</h2>
<p>Acesso completo aos sinais avançados</p>
<div class="price">R$ 29,90</div>
<button class="button">Assinar Agora</button>
</div>
</div>

<div class="footer">
© 2026 NeuroQuant IA - Todos os direitos reservados
</div>

</body>
</html>
