<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>NeuroQuant Multi-Pair Signal</title>
<script src="https://cdn.jsdelivr.net/npm/technicalindicators/dist/browser.js"></script>
<style>
body{background:#0b1120;color:white;font-family:Arial;padding:20px}
h1{color:#00f5ff}
.card{
  background:#111827;
  padding:15px;
  margin-bottom:15px;
  border-radius:10px;
}
.buy{color:lime;font-weight:bold}
.sell{color:red;font-weight:bold}
.neutral{color:yellow}
</style>
</head>
<body>

<h1>Scanner Automático Multi-Pares</h1>
<div id="signals"></div>

<script>

const pairs = [
"BTCUSDT",
"ETHUSDT",
"SOLUSDT",
"BNBUSDT",
"XRPUSDT"
];

async function analyzePair(symbol){

  const response = await fetch(`https://api.binance.com/api/v3/klines?symbol=${symbol}&interval=1h&limit=250`);
  const data = await response.json();

  const closes = data.map(c=>parseFloat(c[4]));
  const volumes = data.map(c=>parseFloat(c[5]));

  const ema21 = technicalindicators.EMA.calculate({period:21,values:closes});
  const ema50 = technicalindicators.EMA.calculate({period:50,values:closes});
  const ema200 = technicalindicators.EMA.calculate({period:200,values:closes});
  const rsi = technicalindicators.RSI.calculate({period:14,values:closes});

  const lastClose = closes[closes.length-1];
  const lastEma21 = ema21[ema21.length-1];
  const lastEma50 = ema50[ema50.length-1];
  const lastEma200 = ema200[ema200.length-1];
  const lastRsi = rsi[rsi.length-1];

  const avgVolume = volumes.slice(-20).reduce((a,b)=>a+b)/20;
  const lastVolume = volumes[volumes.length-1];

  let buyScore = 0;
  let sellScore = 0;

  if(lastClose > lastEma200) buyScore += 20;
  else sellScore += 20;

  if(lastEma21 > lastEma50) buyScore += 15;
  else sellScore += 15;

  if(lastRsi > 55) buyScore += 15;
  if(lastRsi < 45) sellScore += 15;

  if(lastVolume > avgVolume){
    buyScore += 15;
    sellScore += 15;
  }

  if(lastClose > closes[closes.length-10]) buyScore += 20;
  else sellScore += 20;

  let direction = "";
  let probability = 0;
  let className = "";

  if(buyScore > sellScore){
    probability = buyScore;
    direction = "COMPRAR";
    className = "buy";
  }else if(sellScore > buyScore){
    probability = sellScore;
    direction = "VENDER";
    className = "sell";
  }else{
    direction = "NEUTRO";
    className = "neutral";
  }

  return `
    <div class="card">
      <h3>${symbol}</h3>
      <p class="${className}">${direction}</p>
      <p>Probabilidade: ${probability}%</p>
      <p>RSI: ${lastRsi.toFixed(2)}</p>
    </div>
  `;
}

async function runScanner(){
  let html = "";
  for(const pair of pairs){
    html += await analyzePair(pair);
  }
  document.getElementById("signals").innerHTML = html;
}

runScanner();
setInterval(runScanner,60000);

</script>
</body>
</html>
